<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GYMCOMP — Coach View</title>
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --surface2: #1a1a24;
      --border: #252533;
      --text: #f0f0f5;
      --muted: #6b6b85;
      --accent: #c8f53a;
      --accent2: #7c5af5;
      --success: #22c55e;
      --warn: #f59e0b;
      --danger: #ef4444;
      --radius: 12px;
      --font-display: 'Bebas Neue', sans-serif;
      --font-body: 'DM Sans', system-ui, sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
    }

    /* ── Header ─────────────────────────────────────────────── */
    .site-header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .site-header-inner {
      max-width: 1100px;
      margin: 0 auto;
      height: 60px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .logo {
      font-family: var(--font-display);
      font-size: 26px;
      letter-spacing: 2px;
      color: var(--accent);
      flex-shrink: 0;
    }
    .view-badge {
      background: var(--accent2);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 20px;
    }
    .live-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 600;
      color: var(--success);
      margin-left: auto;
    }
    .live-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--success);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ── Layout ──────────────────────────────────────────────── */
    .page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 20px 60px;
    }

    /* ── Comp hero ───────────────────────────────────────────── */
    .comp-hero {
      margin-bottom: 28px;
    }
    .comp-title {
      font-family: var(--font-display);
      font-size: 48px;
      letter-spacing: 2px;
      line-height: 1;
      margin-bottom: 8px;
    }
    .comp-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      color: var(--muted);
      font-size: 13px;
    }

    /* ── Round tabs ──────────────────────────────────────────── */
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .tab-btn {
      padding: 8px 18px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }
    .tab-btn:hover { border-color: var(--accent); color: var(--text); }
    .tab-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #000;
    }

    /* ── Level section ───────────────────────────────────────── */
    .level-section {
      margin-bottom: 32px;
    }
    .level-heading {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    /* ── Gymnast card ────────────────────────────────────────── */
    .gymnast-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      margin-bottom: 12px;
    }
    .gymnast-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }
    .gymnast-num {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: var(--surface2);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      flex-shrink: 0;
    }
    .gymnast-name {
      font-weight: 700;
      font-size: 16px;
      flex: 1;
    }
    .gymnast-club {
      font-size: 12px;
      color: var(--muted);
    }
    .gymnast-total {
      text-align: right;
      flex-shrink: 0;
    }
    .gymnast-total-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 2px;
    }
    .gymnast-total-val {
      font-family: var(--font-display);
      font-size: 28px;
      line-height: 1;
      color: var(--accent);
    }

    /* ── Apparatus grid ──────────────────────────────────────── */
    .apparatus-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 10px;
    }
    .app-block {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
    }
    .app-block.queried {
      border-color: var(--warn);
      background: rgba(245, 158, 11, 0.06);
    }
    .app-block.resolved {
      border-color: var(--success);
      background: rgba(34, 197, 94, 0.06);
    }
    .app-name {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .app-total-row {
      display: flex;
      align-items: baseline;
      gap: 6px;
      margin-bottom: 10px;
    }
    .app-total-val {
      font-family: var(--font-display);
      font-size: 26px;
      line-height: 1;
    }
    .app-total-val.no-score { color: var(--muted); font-size: 18px; }
    .app-total-val.queried-val { color: var(--warn); }

    .breakdown-row {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      margin-bottom: 4px;
    }
    .breakdown-label { color: var(--muted); }
    .breakdown-val { font-weight: 600; font-weight: 600; }
    .breakdown-val.penalty { color: var(--danger); }

    .query-flag {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 6px;
      margin-top: 8px;
    }
    .query-flag.flagged {
      background: rgba(245, 158, 11, 0.15);
      color: var(--warn);
      border: 1px solid rgba(245, 158, 11, 0.3);
    }
    .query-flag.resolved {
      background: rgba(34, 197, 94, 0.12);
      color: var(--success);
      border: 1px solid rgba(34, 197, 94, 0.25);
    }
    .query-note {
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
      font-style: italic;
    }

    /* ── Empty / loading / error states ─────────────────────── */
    .state-full {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      flex-direction: column;
      gap: 16px;
      text-align: center;
      padding: 40px 20px;
    }
    .state-icon { font-size: 48px; margin-bottom: 8px; }
    .state-title { font-size: 20px; font-weight: 700; }
    .state-sub { color: var(--muted); font-size: 14px; max-width: 380px; line-height: 1.6; }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .last-updated {
      font-size: 11px;
      color: var(--muted);
      margin-left: auto;
    }

    .info-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
      padding: 10px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 12px;
      color: var(--muted);
      flex-wrap: wrap;
    }

    @media (max-width: 600px) {
      .comp-title { font-size: 36px; }
      .apparatus-grid { grid-template-columns: 1fr 1fr; }
      .gymnast-header { gap: 8px; }
    }
    @media (max-width: 400px) {
      .apparatus-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header class="site-header">
  <div class="site-header-inner">
    <div class="logo">GYMCOMP</div>
    <span class="view-badge">Coach View</span>
    <div class="live-pill" id="livePill" style="display:none">
      <span class="live-dot"></span> LIVE
    </div>
    <span class="last-updated" id="lastUpdated"></span>
  </div>
</header>

<main class="page" id="main">
  <div class="state-full">
    <div class="spinner"></div>
    <div class="state-title">Loading…</div>
  </div>
</main>

<script>
  const SUPABASE_URL = "https://xjuwbgitqsvrmoejvzwb.supabase.co";
  const SUPABASE_KEY = "sb_publishable_7jhhejhXAH8hlX-gnsElnA_1ih0G-2f";
  const POLL_MS = 10000;

  let activeRound = null;
  let pollTimer = null;
  let compData = null;
  let gymnasts = [];
  let scores = {};

  // ── URL param ──
  const params = new URLSearchParams(location.search);
  const compId = params.get("comp");

  // ── Score key helpers ──
  const sk = (rid, gid, app) => `${rid}__${gid}__${app}`;
  const subKey = (rid, gid, app, sub) => `${rid}__${gid}__${app}__${sub}`;
  const sv = (rid, gid, app, sub) => parseFloat(scores[subKey(rid, gid, app, sub)]) || 0;
  const getTotal = (rid, gid, app) => parseFloat(scores[sk(rid, gid, app)]) || 0;
  const getOverall = (rid, gid) => (compData.apparatus || []).reduce((s, a) => s + getTotal(rid, gid, a), 0);

  const eJudgeCount = (app) =>
    (compData.judges || []).filter(j => j.apparatus === app && (j.role === "E" || !j.role)).length;

  const getEAvg = (rid, gid, app) => {
    const n = Math.max(eJudgeCount(app), 1);
    let sum = 0, count = 0;
    for (let i = 1; i <= n; i++) {
      const v = sv(rid, gid, app, `e${i}`);
      if (v > 0) { sum += v; count++; }
    }
    return count > 0 ? sum / count : 0;
  };

  const fmt = (v) => v > 0 ? v.toFixed(3) : "—";
  const fmt2 = (v) => v > 0 ? v.toFixed(2) : "—";

  // ── Fetch ──
  async function fetchData() {
    if (!compId) return null;
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/competitions?id=eq.${compId}&select=*`,
      { headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` } }
    );
    if (!res.ok) return null;
    const rows = await res.json();
    return rows[0] || null;
  }

  // ── Render helpers ──
  function renderApparatusBlock(rid, gid, app) {
    const fig = !!compData.useDEScoring;
    const total = getTotal(rid, gid, app);
    const isQueried = !!scores[subKey(rid, gid, app, "query")];
    const isResolved = !!scores[subKey(rid, gid, app, "queryResolved")];
    const queryNote = scores[subKey(rid, gid, app, "queryNote")] || "";

    let blockClass = "app-block";
    if (isQueried && !isResolved) blockClass += " queried";
    if (isResolved) blockClass += " resolved";

    let totalValClass = "app-total-val";
    if (!total) totalValClass += " no-score";
    if (isQueried && !isResolved) totalValClass += " queried-val";

    let breakdownHtml = "";

    if (fig && total > 0) {
      const dv = sv(rid, gid, app, "dv");
      const bonus = sv(rid, gid, app, "bon");
      const eAvg = getEAvg(rid, gid, app);
      const tf = sv(rid, gid, app, "tf");
      const oob = sv(rid, gid, app, "oob");
      const fall = sv(rid, gid, app, "fall");
      const nd = sv(rid, gid, app, "nd");
      const pen = tf + oob + fall + nd;

      const n = Math.max(eJudgeCount(app), 1);
      let eRowsHtml = "";
      for (let i = 1; i <= n; i++) {
        const ev = sv(rid, gid, app, `e${i}`);
        if (ev > 0 || n > 1) {
          eRowsHtml += `<div class="breakdown-row"><span class="breakdown-label">E${i}</span><span class="breakdown-val">${fmt(ev)}</span></div>`;
        }
      }

      breakdownHtml = `
        ${dv > 0 ? `<div class="breakdown-row"><span class="breakdown-label">D Score</span><span class="breakdown-val">${fmt(dv)}</span></div>` : ""}
        ${bonus > 0 ? `<div class="breakdown-row"><span class="breakdown-label">Bonus</span><span class="breakdown-val">+${fmt(bonus)}</span></div>` : ""}
        ${eRowsHtml}
        ${eAvg > 0 ? `<div class="breakdown-row"><span class="breakdown-label">E Avg</span><span class="breakdown-val">${fmt(eAvg)}</span></div>` : ""}
        ${pen > 0 ? `<div class="breakdown-row"><span class="breakdown-label">Penalties</span><span class="breakdown-val penalty">−${fmt2(pen)}</span></div>` : ""}
      `;
    }

    let queryHtml = "";
    if (isQueried && !isResolved) {
      queryHtml = `<span class="query-flag flagged">⚠ Under Review</span>`;
      if (queryNote) queryHtml += `<div class="query-note">${escHtml(queryNote)}</div>`;
    } else if (isResolved) {
      queryHtml = `<span class="query-flag resolved">✓ Query Resolved</span>`;
    }

    const displayVal = (isQueried && !isResolved)
      ? "Under Review"
      : (total > 0 ? total.toFixed(2) : "—");

    return `
      <div class="${blockClass}">
        <div class="app-name">${escHtml(app)}</div>
        <div class="app-total-row">
          <span class="${totalValClass}">${displayVal}</span>
        </div>
        ${breakdownHtml}
        ${queryHtml}
      </div>
    `;
  }

  function renderGymnastCard(rid, g) {
    const overall = getOverall(rid, g.id);
    const apparatus = compData.apparatus || [];

    const appBlocksHtml = apparatus
      .map(app => renderApparatusBlock(rid, g.id, app))
      .join("");

    return `
      <div class="gymnast-card">
        <div class="gymnast-header">
          <div class="gymnast-num">${escHtml(String(g.number || "—"))}</div>
          <div style="flex:1">
            <div class="gymnast-name">${escHtml(g.name)}</div>
            <div class="gymnast-club">${escHtml(g.club || "")}</div>
          </div>
          <div class="gymnast-total">
            <div class="gymnast-total-label">Overall</div>
            <div class="gymnast-total-val">${overall > 0 ? overall.toFixed(2) : "—"}</div>
          </div>
        </div>
        <div class="apparatus-grid">${appBlocksHtml}</div>
      </div>
    `;
  }

  function buildRoundContent(round) {
    const rid = round.id;
    const roundGymnasts = gymnasts.filter(g => g.round === rid);

    if (!roundGymnasts.length) {
      return `<div style="color:var(--muted);font-size:13px;padding:20px 0">No gymnasts in this round.</div>`;
    }

    // Group by level
    const levelMap = {};
    roundGymnasts.forEach(g => {
      const levelObj = compData.levels.find(l => l.id === g.level);
      const levelName = levelObj ? levelObj.name : "Unknown";
      if (!levelMap[levelName]) levelMap[levelName] = [];
      levelMap[levelName].push(g);
    });

    return Object.entries(levelMap)
      .sort(([a], [b]) => a.localeCompare(b))
      .map(([levelName, glist]) => {
        const sortedGymnasts = [...glist].sort((a, b) => (a.number || 0) - (b.number || 0));
        return `
          <div class="level-section">
            <div class="level-heading">${escHtml(levelName)}</div>
            ${sortedGymnasts.map(g => renderGymnastCard(rid, g)).join("")}
          </div>
        `;
      }).join("");
  }

  function renderPage() {
    const rounds = compData.rounds || [];
    if (!activeRound && rounds.length) activeRound = rounds[0].id;

    const tabsHtml = rounds.length > 1 ? `
      <div class="tabs">
        ${rounds.map(r => `
          <button class="tab-btn ${r.id === activeRound ? "active" : ""}"
            onclick="switchRound('${r.id}')">${escHtml(r.name)}</button>
        `).join("")}
      </div>
    ` : "";

    const currentRound = rounds.find(r => r.id === activeRound) || rounds[0];
    const roundContent = currentRound ? buildRoundContent(currentRound) : "";

    const colour = compData.brandColour || "#c8f53a";
    const dateStr = compData.date
      ? new Date(compData.date + "T12:00:00").toLocaleDateString("en-GB", { weekday: "long", day: "numeric", month: "long", year: "numeric" })
      : "";
    const venue = compData.venue || compData.location || "";

    const fig = !!compData.useDEScoring;
    const queryCount = countActiveQueries();

    document.getElementById("main").innerHTML = `
      <div class="comp-hero">
        <div class="comp-title" style="color:${colour}">${escHtml(compData.name || "Competition")}</div>
        <div class="comp-meta">
          ${dateStr ? `<span>📅 ${dateStr}</span>` : ""}
          ${venue ? `<span>📍 ${escHtml(venue)}</span>` : ""}
          ${fig ? `<span style="color:var(--accent2);font-weight:700">⚡ D/E Scoring</span>` : ""}
        </div>
      </div>

      ${queryCount > 0 ? `
        <div class="info-bar" style="border-color:rgba(245,158,11,0.4);background:rgba(245,158,11,0.06)">
          <span style="color:var(--warn);font-weight:700">⚠ ${queryCount} active ${queryCount === 1 ? "query" : "queries"} under review</span>
        </div>
      ` : ""}

      ${tabsHtml}
      ${roundContent}
    `;
  }

  function countActiveQueries() {
    let count = 0;
    gymnasts.forEach(g => {
      (compData.apparatus || []).forEach(app => {
        (compData.rounds || []).forEach(r => {
          if (scores[subKey(r.id, g.id, app, "query")] && !scores[subKey(r.id, g.id, app, "queryResolved")]) {
            count++;
          }
        });
      });
    });
    return count;
  }

  function switchRound(rid) {
    activeRound = rid;
    renderPage();
  }

  function updateTimestamp() {
    const el = document.getElementById("lastUpdated");
    if (el) el.textContent = "Updated " + new Date().toLocaleTimeString("en-GB", { hour: "2-digit", minute: "2-digit", second: "2-digit" });
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  async function poll() {
    const row = await fetchData();
    if (!row || !row.data) return;
    compData = row.data.compData || {};
    gymnasts = row.data.gymnasts || [];
    scores = row.data.scores || {};
    renderPage();
    updateTimestamp();
  }

  async function init() {
    if (!compId) {
      document.getElementById("main").innerHTML = `
        <div class="state-full">
          <div class="state-icon">🔗</div>
          <div class="state-title">No competition ID</div>
          <div class="state-sub">Please open this link from the competition dashboard. The URL should include <code>?comp=…</code></div>
        </div>`;
      return;
    }

    const row = await fetchData();
    if (!row || !row.data) {
      document.getElementById("main").innerHTML = `
        <div class="state-full">
          <div class="state-icon">⚠️</div>
          <div class="state-title">Competition not found</div>
          <div class="state-sub">Please check your link or contact the event organiser.</div>
        </div>`;
      return;
    }

    compData = row.data.compData || {};
    gymnasts = row.data.gymnasts || [];
    scores = row.data.scores || {};

    renderPage();
    updateTimestamp();
    document.getElementById("livePill").style.display = "flex";

    pollTimer = setInterval(async () => {
      await poll();
    }, POLL_MS);
  }

  init();
</script>
</body>
</html>

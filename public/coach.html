<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GYMCOMP — Coach View</title>
  <style>
    @font-face {
      font-family: 'Saans';
      src: url('./SaansVF.woff2') format('woff2');
      font-weight: 100 900;
      font-style: normal;
      font-display: swap;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f5f5;
      --surface: #ffffff;
      --surface2: #f0f0f0;
      --border: #e4e4e4;
      --text: #2e2e2e;
      --muted: #909090;
      --accent: #000dff;
      --accent2: #625FD1;
      --accent3: #d4d3ff;
      --success: #22c55e;
      --warn: #f59e0b;
      --danger: #ef4444;
      --radius: 12px;
      --font: 'Saans', system-ui, -apple-system, sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
    }

    /* ── Header ─────────────────────────────────────────────── */
    .site-header {
      background: var(--accent);
      padding: 0 20px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .site-header-inner {
      max-width: 960px;
      margin: 0 auto;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .logo {
      font-family: var(--font);
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }
    .view-badge {
      background: rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.9);
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
    }
    .live-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 600;
      color: rgba(255,255,255,0.9);
      margin-left: auto;
    }
    .live-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--success);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ── Layout ──────────────────────────────────────────────── */
    .page {
      max-width: 960px;
      margin: 0 auto;
      padding: 24px 20px 60px;
    }

    /* ── Comp hero ───────────────────────────────────────────── */
    .comp-hero {
      margin-bottom: 28px;
    }
    .comp-title-row {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }
    .comp-title {
      font-family: var(--font);
      font-size: 36px;
      font-weight: 800;
      line-height: 1.1;
      color: var(--text);
    }
    .comp-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      color: var(--muted);
      font-size: 13px;
    }

    /* ── Round tabs ──────────────────────────────────────────── */
    .tab-btn {
      padding: 10px 20px;
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--muted);
      font-family: var(--font);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      border-radius: 0;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active {
      color: var(--accent2);
      border-bottom-color: var(--accent2);
    }

    /* ── Level section ───────────────────────────────────────── */
    .level-section {
      margin-bottom: 32px;
    }
    .level-heading {
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .level-heading .age-pill {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      background: rgba(0,13,255,0.06);
      padding: 4px 12px;
      border-radius: 99px;
    }
    .filter-select {
      font-family: var(--font);
      font-size: 12px;
      font-weight: 500;
      padding: 6px 32px 6px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
      background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%23909090' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
      background-repeat: no-repeat;
      background-position: right 12px center;
    }
    .filter-select:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }
    .filter-clear {
      font-family: var(--font);
      font-size: 11px;
      font-weight: 600;
      padding: 6px 12px;
      border: none;
      border-radius: 8px;
      background: none;
      color: var(--muted);
      cursor: pointer;
    }
    .filter-clear:hover { color: var(--text); }

    /* ── Gymnast card ────────────────────────────────────────── */
    .gymnast-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 12px;
    }
    .gymnast-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 16px;
    }
    .gymnast-num {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      background: var(--surface2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      flex-shrink: 0;
    }
    .gymnast-name {
      font-weight: 700;
      font-size: 20px;
      flex: 1;
      min-width: 0;
    }
    .gymnast-club {
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      padding: 6px 14px;
      border-radius: 8px;
      flex-shrink: 0;
    }
    .gymnast-overall {
      text-align: right;
      flex-shrink: 0;
      padding-left: 12px;
      border-left: 1px solid var(--border);
      margin-left: 4px;
    }
    .gymnast-overall-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: var(--muted);
    }
    .gymnast-overall-val {
      font-weight: 800;
      font-size: 30px;
      line-height: 1;
      color: var(--accent);
    }

    /* ── Apparatus grid ──────────────────────────────────────── */
    .apparatus-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 10px;
    }
    .app-block {
      background: var(--surface2);
      border-radius: 10px;
      padding: 12px;
      border: 1px solid transparent;
    }
    .app-block.dual {
      grid-column: span 2;
    }
    .app-block.queried {
      border-color: var(--warn);
      background: rgba(245, 158, 11, 0.04);
    }
    .app-block.resolved {
      border-color: var(--success);
      background: rgba(34, 197, 94, 0.04);
    }
    .app-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .app-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
    }
    .app-block .app-score {
      background: var(--surface);
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 20px;
      font-weight: 800;
      color: var(--accent);
      line-height: 1;
    }
    .app-block .app-score.no-score { color: var(--muted); font-size: 16px; }
    .app-block .app-score.queried-val { color: var(--warn); font-size: 14px; }
    .app-breakdown {
      display: flex;
      gap: 6px;
    }
    .bd-cell {
      flex: 1;
      background: var(--surface);
      border-radius: 6px;
      padding: 6px 4px;
      text-align: center;
    }
    .bd-label {
      display: block;
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 2px;
    }
    .bd-val {
      display: block;
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
    }
    .bd-val.na { color: var(--muted); font-weight: 500; }
    .bd-val.penalty { color: var(--danger); }

    .query-flag {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 6px;
      margin-top: 8px;
    }
    .query-flag.flagged {
      background: rgba(245, 158, 11, 0.1);
      color: var(--warn);
      border: 1px solid rgba(245, 158, 11, 0.25);
    }
    .query-flag.resolved {
      background: rgba(34, 197, 94, 0.08);
      color: var(--success);
      border: 1px solid rgba(34, 197, 94, 0.2);
    }
    .query-note {
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
      font-style: italic;
    }

    /* ── View toggle ─────────────────────────────────────────── */
    .view-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 24px;
    }
    .toggle-btn {
      padding: 7px 16px;
      border-radius: 56px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      font-family: var(--font);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }
    .toggle-btn.active {
      border-color: transparent;
      background: var(--accent3);
      color: var(--accent);
    }

    /* ── Overall table styles ──────────────────────────────── */
    .table-wrap { overflow-x: auto; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    th {
      padding: 8px 12px;
      text-align: left;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    tr.dns-row td { opacity: 0.45; }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 9px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 700;
      white-space: nowrap;
    }
    .badge-gold { background: rgba(245, 158, 11, 0.12); color: #d97706; }
    .badge-silver { background: rgba(148, 163, 184, 0.12); color: #64748b; }
    .badge-bronze { background: rgba(180, 83, 9, 0.12); color: #b45309; }
    .badge-medal { background: rgba(0, 13, 255, 0.07); color: #4a50c7; }
    .badge-rank { background: var(--surface2); color: var(--muted); }
    .badge-dns { background: rgba(144,144,144,0.1); color: var(--muted); }

    .score-total {
      font-weight: 800;
      font-size: 16px;
      color: var(--accent);
    }
    .app-score {
      color: var(--muted);
      font-size: 12px;
    }
    .gymnast-club-cell { font-weight: 500; color: var(--muted); max-width: 12ch; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    td.gymnast-name { font-size: 13px; font-weight: 500; }
    td.app-score, td.score-total-cell { text-align: center; }
    th.col-score { text-align: center; }

    /* ── Empty / loading / error states ─────────────────────── */
    .state-full {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      flex-direction: column;
      gap: 16px;
      text-align: center;
      padding: 40px 20px;
    }
    .state-icon { font-size: 48px; margin-bottom: 8px; }
    .state-title { font-size: 20px; font-weight: 700; }
    .state-sub { color: var(--muted); font-size: 14px; max-width: 380px; line-height: 1.6; }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }


    .info-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
      padding: 10px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 12px;
      color: var(--muted);
      flex-wrap: wrap;
    }

    /* ── Lock screen ─────────────────────────────────────────── */
    .lock-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 80vh;
      padding: 40px 20px;
    }
    .lock-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px 40px;
      max-width: 420px;
      width: 100%;
      text-align: center;
    }
    .lock-box .lock-icon { font-size: 48px; margin-bottom: 16px; }
    .lock-box .lock-title { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
    .lock-box .lock-sub { font-size: 13px; color: var(--muted); margin-bottom: 28px; line-height: 1.6; }
    .lock-input {
      font-family: monospace;
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 2px;
      text-align: center;
      padding: 14px 20px;
      border: 2px solid var(--border);
      border-radius: 12px;
      width: 100%;
      outline: none;
      text-transform: uppercase;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .lock-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,13,255,0.1); }
    .lock-input.error { border-color: var(--danger); box-shadow: 0 0 0 3px rgba(239,68,68,0.1); animation: shake 0.4s; }
    .lock-error { font-size: 12px; color: var(--danger); margin-top: 8px; font-weight: 600; min-height: 18px; }
    .lock-btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 36px;
      border-radius: 56px;
      border: none;
      background: var(--accent);
      color: #fff;
      font-family: var(--font);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .lock-btn:hover { opacity: 0.9; }
    .lock-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-8px); }
      40% { transform: translateX(8px); }
      60% { transform: translateX(-6px); }
      80% { transform: translateX(6px); }
    }

    .header-club-name {
      font-size: 12px;
      font-weight: 600;
      color: rgba(255,255,255,0.9);
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .switch-club-btn {
      font-family: var(--font);
      font-size: 11px;
      font-weight: 600;
      padding: 6px 14px;
      border-radius: 56px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      cursor: pointer;
    }
    .switch-club-btn:hover { color: var(--text); }

    tr.my-club-row td { background: rgba(0,13,255,0.04); }

    @media (max-width: 600px) {
      .comp-title { font-size: 24px; }
      .apparatus-grid { grid-template-columns: 1fr 1fr; }
      .gymnast-header { gap: 10px; }
      .gymnast-num { width: 36px; height: 36px; font-size: 16px; }
      .gymnast-name { font-size: 16px; }
      .gymnast-club { display: none; }
      .gymnast-overall-val { font-size: 18px; }
      .lock-box { padding: 32px 24px; }
    }
    @media (max-width: 400px) {
      .apparatus-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header class="site-header">
  <div class="site-header-inner">
    <div class="logo"><img src="./Logo-mono-white.svg" alt="GymComp" height="20" /></div>
    <span class="view-badge">Coach View</span>
    <span class="header-club-name" id="headerClubName" style="display:none"></span>
    <div style="flex:1"></div>
    <div class="live-pill" id="livePill" style="display:none">
      <span class="live-dot"></span> LIVE
    </div>
  </div>
</header>

<main class="page" id="main">
  <div class="state-full">
    <div class="spinner"></div>
    <div class="state-title">Loading…</div>
  </div>
</main>

<script>
  const SUPABASE_URL = "https://xjuwbgitqsvrmoejvzwb.supabase.co";
  const SUPABASE_KEY = "sb_publishable_7jhhejhXAH8hlX-gnsElnA_1ih0G-2f";
  const POLL_MS = 10000;

  let activeRound = null;
  let activeView = "myclub"; // "myclub" | "overall"
  let clubFilter = "all";
  let pollTimer = null;
  let compData = null;
  let gymnasts = [];
  let scores = {};

  // ── Club auth state ──
  let authedClubCode = null;  // e.g. "UGC-4821"
  let authedClubName = null;  // resolved from compData on each poll

  // ── Club colour ──
  const CLUB_COLOURS = [
    "#6366f1","#8b5cf6","#a855f7","#d946ef","#ec4899",
    "#f43f5e","#ef4444","#f97316","#f59e0b","#eab308",
    "#84cc16","#22c55e","#14b8a6","#06b6d4","#0ea5e9",
    "#3b82f6","#6d28d9","#be185d","#b45309","#0d9488"
  ];
  const clubColourCache = {};
  function clubColour(name) {
    if (!name) return "var(--muted)";
    if (clubColourCache[name]) return clubColourCache[name];
    let h = 0;
    for (let i = 0; i < name.length; i++) h = ((h << 5) - h + name.charCodeAt(i)) | 0;
    clubColourCache[name] = CLUB_COLOURS[Math.abs(h) % CLUB_COLOURS.length];
    return clubColourCache[name];
  }

  // ── URL param ──
  const params = new URLSearchParams(location.search);
  const compId = params.get("comp");

  // ── Score key helpers ──
  const sk = (rid, gid, app) => `${rid}__${gid}__${app}`;
  const subKey = (rid, gid, app, sub) => `${rid}__${gid}__${app}__${sub}`;
  const sv = (rid, gid, app, sub) => parseFloat(scores[subKey(rid, gid, app, sub)]) || 0;
  const getTotal = (rid, gid, app) => parseFloat(scores[sk(rid, gid, app)]) || 0;
  const getOverall = (rid, gid) => (compData.apparatus || []).reduce((s, a) => s + getTotal(rid, gid, a), 0);

  const judgeCount = (app) =>
    (compData.judges || []).filter(j => j.apparatus === app).length;

  const getEAvg = (rid, gid, app) => {
    const n = Math.max(judgeCount(app), 1);
    let sum = 0, count = 0;
    for (let i = 1; i <= n; i++) {
      const v = sv(rid, gid, app, `e${i}`);
      if (!isNaN(v)) { sum += (10 - v); count++; }
    }
    return count > 0 ? sum / count : 0;
  };

  const getEDeductionAvg = (rid, gid, app) => {
    const n = Math.max(judgeCount(app), 1);
    let sum = 0, count = 0;
    for (let i = 1; i <= n; i++) {
      const v = sv(rid, gid, app, `e${i}`);
      if (!isNaN(v) && v > 0) { sum += v; count++; }
    }
    return count > 0 ? sum / count : 0;
  };

  const fmt = (v) => v > 0 ? v.toFixed(3) : "—";
  const fmt2 = (v) => v > 0 ? v.toFixed(3) : "—";

  // ── Filter helpers ──
  function getUniqueClubs() {
    return [...new Set(gymnasts.map(g => g.club || "").filter(Boolean))].sort();
  }

  function setClubFilterVal(val) {
    clubFilter = val;
    renderPage();
  }

  function clearFilters() {
    clubFilter = "all";
    renderPage();
  }

  function buildFilterHtml() {
    // No filter dropdown in myclub (already scoped) or overall (show everyone)
    if (activeView === "myclub" || activeView === "overall") return "";
    const clubs = getUniqueClubs();
    if (clubs.length < 2) return "";
    return `
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:20px;flex-wrap:wrap">
        <span style="font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px">Filter by Club</span>
        <select class="filter-select" onchange="setClubFilterVal(this.value)" style="border-left:3px solid ${clubFilter !== "all" ? clubColour(clubFilter) : "var(--border)"}">
          <option value="all"${clubFilter === "all" ? " selected" : ""}>All Clubs</option>
          ${clubs.map(c => `<option value="${escHtml(c)}"${c === clubFilter ? " selected" : ""}>${escHtml(c)}</option>`).join("")}
        </select>
        ${clubFilter !== "all" ? `<button class="filter-clear" onclick="clearFilters()">Clear</button>` : ""}
      </div>
    `;
  }

  // ── Lock screen ──
  function renderLockScreen() {
    document.getElementById("main").innerHTML = `
      <div class="lock-screen">
        <div class="lock-box">
          <div class="lock-icon">🔐</div>
          <div class="lock-title">Club Access</div>
          <div class="lock-sub">Enter your Club ID to view your gymnasts' scores and results. Your organiser can provide this code.</div>
          <input class="lock-input" id="clubCodeInput" type="text" maxlength="8" placeholder="ABC-1234"
            oninput="formatClubInput(this)" onkeydown="if(event.key==='Enter')submitClubCode()" />
          <div class="lock-error" id="lockError"></div>
          <button class="lock-btn" onclick="submitClubCode()">Enter</button>
        </div>
      </div>
    `;
    document.getElementById("clubCodeInput").focus();
  }

  function formatClubInput(el) {
    let v = el.value.toUpperCase().replace(/[^A-Z0-9]/g, "");
    if (v.length > 3) v = v.slice(0, 3) + "-" + v.slice(3);
    if (v.length > 8) v = v.slice(0, 8);
    el.value = v;
    // Clear error on input
    const errEl = document.getElementById("lockError");
    if (errEl) errEl.textContent = "";
    el.classList.remove("error");
  }

  function submitClubCode() {
    const input = document.getElementById("clubCodeInput");
    const code = (input.value || "").trim().toUpperCase();
    const errEl = document.getElementById("lockError");

    if (!code || code.length < 8) {
      input.classList.add("error");
      errEl.textContent = "Please enter a valid Club ID (e.g. ABC-1234)";
      return;
    }

    // Validate against compData clubs
    const club = (compData.clubs || []).find(c => c.clubCode === code);
    if (!club) {
      input.classList.add("error");
      errEl.textContent = "Club ID not recognised. Please check and try again.";
      return;
    }

    // Success — authenticate
    authedClubCode = code;
    authedClubName = club.name;
    activeView = "myclub";

    // Persist in sessionStorage
    try { sessionStorage.setItem("coach_club_" + compId, code); } catch {}

    // Update header
    showClubHeader();

    // Render the coach view
    renderPage();
    updateTimestamp();
    document.getElementById("livePill").style.display = "flex";

    // Start polling
    if (pollTimer) clearInterval(pollTimer);
    pollTimer = setInterval(() => poll(), POLL_MS);
  }

  function showClubHeader() {
    const nameEl = document.getElementById("headerClubName");
    if (nameEl && authedClubName) {
      nameEl.textContent = authedClubName;
      nameEl.style.display = "";
    }
  }

  function hideClubHeader() {
    const nameEl = document.getElementById("headerClubName");
    if (nameEl) { nameEl.style.display = "none"; nameEl.textContent = ""; }
  }

  function switchClub() {
    authedClubCode = null;
    authedClubName = null;
    try { sessionStorage.removeItem("coach_club_" + compId); } catch {}
    if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
    hideClubHeader();
    document.getElementById("livePill").style.display = "none";
    renderLockScreen();
  }

  function resolveClubName() {
    if (!authedClubCode || !compData) return;
    const club = (compData.clubs || []).find(c => c.clubCode === authedClubCode);
    if (club) authedClubName = club.name;
    const nameEl = document.getElementById("headerClubName");
    if (nameEl && authedClubName) nameEl.textContent = authedClubName;
  }

  // ── Standard competition ranking (1,2,2,4,5,6) ──
  function standardRank(items, scoreKey) {
    const sorted = [...items].sort((a, b) => b[scoreKey] - a[scoreKey]);
    let rank = 1;
    return sorted.map((item, i) => {
      if (i > 0 && sorted[i][scoreKey] < sorted[i - 1][scoreKey]) rank = i + 1;
      return { ...item, rank };
    });
  }

  function rankBadge(rank) {
    if (rank === null) return `<span class="badge badge-dns">DNS</span>`;
    if (rank === 1) return `<span class="badge badge-gold">🥇 1st</span>`;
    if (rank === 2) return `<span class="badge badge-silver">🥈 2nd</span>`;
    if (rank === 3) return `<span class="badge badge-bronze">🥉 3rd</span>`;
    if (rank <= 6) return `<span class="badge badge-medal">${rank}th</span>`;
    return `<span class="badge badge-rank">${rank}th</span>`;
  }

  function renderOverallView(round) {
    const rid = round.id;
    const allGroups = buildRankGroups(rid);
    const groups = allGroups.filter(rg => rg.gymnasts.length > 0);

    const apparatus = compData.apparatus || [];
    if (!groups.length) return `${buildFilterHtml()}<div style="color:var(--muted);font-size:13px;padding:20px 0">No results to display.</div>`;

    return buildFilterHtml() + groups.map(({ levelName, ageLabel, gymnasts: glist }) => {
      const agePill = ageLabel ? `<span class="age-pill">${escHtml(ageLabel)}</span>` : "";
      const withTotals = glist.map(g => ({ ...g, total: getOverall(rid, g.id) }));
      const ranked = standardRank(withTotals.filter(g => g.total > 0 && !g.dns), "total");
      const unscored = withTotals.filter(g => g.total === 0 && !g.dns);
      const dns = withTotals.filter(g => !!g.dns);

      // Find top score per apparatus for highlighting
      const topScores = {};
      apparatus.forEach(a => {
        let best = 0;
        glist.forEach(g => { if (!g.dns) { const s = getTotal(rid, g.id, a); if (s > best) best = s; } });
        if (best > 0) topScores[a] = best;
      });

      const appHeaders = apparatus.map(a => `<th class="col-score">${escHtml(a)}</th>`).join("");

      const rows = [
        ...ranked.map(g => {
          const isMyClub = authedClubName && (g.club || "") === authedClubName;
          const appCells = apparatus.map(a => {
            const s = getTotal(rid, g.id, a);
            const isTop = s > 0 && topScores[a] && s === topScores[a];
            return `<td class="app-score"${isTop ? ' style="background:rgba(0,13,255,0.08);color:var(--accent);font-weight:700"' : ''}>${s > 0 ? s.toFixed(3) : "—"}</td>`;
          }).join("");
          return `
            <tr${isMyClub ? ' class="my-club-row"' : ''}>
              <td>${rankBadge(g.rank)}</td>

              <td class="gymnast-name">${escHtml(g.name)}</td>
              <td class="gymnast-club-cell">${escHtml(g.club || "")}</td>
              ${appCells}
              <td class="score-total-cell"><span class="score-total">${g.total.toFixed(3)}</span></td>
            </tr>
          `;
        }),
        ...unscored.sort((a, b) => (parseInt(a.number) || 0) - (parseInt(b.number) || 0)).map(g => {
          const isMyClub = authedClubName && (g.club || "") === authedClubName;
          const appCells = apparatus.map(a => {
            const s = getTotal(rid, g.id, a);
            return `<td class="app-score"${s > 0 ? '' : ' style="color:var(--muted)"'}>${s > 0 ? s.toFixed(3) : "—"}</td>`;
          }).join("");
          return `
            <tr${isMyClub ? ' class="my-club-row"' : ''}>
              <td></td>

              <td class="gymnast-name">${escHtml(g.name)}</td>
              <td class="gymnast-club-cell">${escHtml(g.club || "")}</td>
              ${appCells}
              <td class="score-total-cell" style="color:var(--muted)">—</td>
            </tr>
          `;
        }),
        ...dns.map(g => {
          const isMyClub = authedClubName && (g.club || "") === authedClubName;
          const appCells = apparatus.map(() => `<td class="app-score" style="color:var(--muted)">—</td>`).join("");
          return `
            <tr class="${isMyClub ? 'my-club-row ' : ''}dns-row">
              <td>${rankBadge(null)}</td>

              <td>${escHtml(g.name)}</td>
              <td style="color:var(--muted)">${escHtml(g.club || "")}</td>
              ${appCells}
              <td class="score-total-cell" style="color:var(--muted)">—</td>
            </tr>
          `;
        })
      ].join("");

      const hasAnyScore = withTotals.some(g => g.total > 0);

      // If no scores yet, show all gymnasts in number order without ranks
      let finalRows = rows;
      if (!hasAnyScore) {
        const sorted = [...withTotals].filter(g => !g.dns).sort((a, b) => (parseInt(a.number) || 0) - (parseInt(b.number) || 0));
        const dnsOnly = withTotals.filter(g => !!g.dns);
        finalRows = [
          ...sorted.map(g => {
            const isMyClub = authedClubName && (g.club || "") === authedClubName;
            const appCells = apparatus.map(() => `<td class="app-score" style="color:var(--muted)">—</td>`).join("");
            return `
              <tr${isMyClub ? ' class="my-club-row"' : ''}>
                <td></td>
  
                <td class="gymnast-name">${escHtml(g.name)}</td>
                <td class="gymnast-club-cell">${escHtml(g.club || "")}</td>
                ${appCells}
                <td class="score-total-cell" style="color:var(--muted)">—</td>
              </tr>
            `;
          }),
          ...dnsOnly.map(g => {
            const isMyClub = authedClubName && (g.club || "") === authedClubName;
            const appCells = apparatus.map(() => `<td class="app-score" style="color:var(--muted)">—</td>`).join("");
            return `
              <tr class="${isMyClub ? 'my-club-row ' : ''}dns-row">
                <td>${rankBadge(null)}</td>
  
                <td>${escHtml(g.name)}</td>
                <td style="color:var(--muted)">${escHtml(g.club || "")}</td>
                ${appCells}
                <td class="score-total-cell" style="color:var(--muted)">—</td>
              </tr>
            `;
          })
        ].join("");
      }

      return `
        <div class="level-section">
          <div class="level-heading">${escHtml(levelName)}${agePill}</div>
          <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;padding:16px 20px">
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>Rank</th><th>Gymnast</th><th>Club</th>
                    ${appHeaders}
                    <th class="col-score">Total</th>
                  </tr>
                </thead>
                <tbody>${finalRows}</tbody>
              </table>
            </div>
          </div>
        </div>
      `;
    }).join("");
  }

  function switchView(v) {
    activeView = v;
    renderPage();
  }

  // ── Fetch ──
  async function fetchData() {
    if (!compId) return null;
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/competitions?id=eq.${encodeURIComponent(compId)}&select=*`,
      { headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` } }
    );
    if (!res.ok) return null;
    const rows = await res.json();
    return rows[0] || null;
  }

  // Fetch scores from the dedicated scores table (anon key)
  async function fetchTableScores() {
    if (!compId) return [];
    try {
      const res = await fetch(
        `${SUPABASE_URL}/rest/v1/scores?comp_id=eq.${encodeURIComponent(compId)}&select=*`,
        { headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` } }
      );
      if (!res.ok) return [];
      return await res.json();
    } catch { return []; }
  }

  // Convert scores table rows → flat object
  function scoresToFlat(rows) {
    const flat = {};
    for (const row of rows) {
      const bk = `${row.round_id}__${row.gymnast_id}__${row.apparatus}`;
      flat[bk] = row.final_score != null ? String(row.final_score) : "";

      const eScores = row.e_scores;

      // Dual vault: e_scores is an object with dualVault flag
      if (eScores && typeof eScores === "object" && !Array.isArray(eScores) && eScores.dualVault) {
        flat[`${bk}__dualVault`] = "1";
        for (const prefix of ["v1", "v2"]) {
          const v = eScores[prefix];
          if (!v) continue;
          if (v.d != null) flat[`${bk}__${prefix}dv`] = String(v.d);
          if (v.e && Array.isArray(v.e)) {
            for (let i = 0; i < v.e.length; i++) {
              if (v.e[i] != null) flat[`${bk}__${prefix}e${i + 1}`] = String(v.e[i]);
            }
          }
          if (v.bon != null && v.bon !== 0) flat[`${bk}__${prefix}bon`] = String(v.bon);
          if (v.pen != null && v.pen !== 0) flat[`${bk}__${prefix}pen`] = String(v.pen);
          if (v.final != null) flat[`${bk}__${prefix}fin`] = String(v.final);
        }
        continue;
      }

      // Normal score
      if (row.d_score != null) flat[`${bk}__dv`] = String(row.d_score);
      if (row.bonus != null && row.bonus !== 0) flat[`${bk}__bon`] = String(row.bonus);
      if (row.penalty != null && row.penalty !== 0) flat[`${bk}__pen`] = String(row.penalty);
      const eArr = eScores || [];
      if (Array.isArray(eArr)) {
        for (let i = 0; i < eArr.length; i++) {
          if (eArr[i] != null) flat[`${bk}__e${i + 1}`] = String(eArr[i]);
        }
      }
    }
    return flat;
  }

  // ── Render helpers ──
  function renderApparatusBlock(rid, gid, app) {
    const fig = true;
    const total = getTotal(rid, gid, app);
    const isQueried = !!scores[subKey(rid, gid, app, "query")];
    const isResolved = !!scores[subKey(rid, gid, app, "queryResolved")];
    const queryNote = scores[subKey(rid, gid, app, "queryNote")] || "";

    const isDual = !!scores[subKey(rid, gid, app, "dualVault")];
    const v2HasData = isDual && parseFloat(scores[subKey(rid, gid, app, "v2fin")]) > 0;
    let blockClass = "app-block";
    if (isDual && v2HasData) blockClass += " dual";
    if (isQueried && !isResolved) blockClass += " queried";
    if (isResolved) blockClass += " resolved";

    // Score display
    let scoreClass = "app-score";
    if (!total) scoreClass += " no-score";
    if (isQueried && !isResolved) scoreClass += " queried-val";
    const displayVal = (isQueried && !isResolved)
      ? "Under Review"
      : (total > 0 ? total.toFixed(3) : "—");

    // Breakdown cells
    let breakdownHtml = "";
    const bdFmt = (v) => v > 0 ? v.toFixed(2) : "0";

    if (fig && isDual) {
      // Dual vault breakdown — full D/E/B/P for each vault, side by side
      const v1fin = parseFloat(scores[subKey(rid, gid, app, "v1fin")]) || 0;
      const v2fin = parseFloat(scores[subKey(rid, gid, app, "v2fin")]) || 0;

      const vaultHalf = (prefix, label, fin) => {
        const dv = parseFloat(scores[subKey(rid, gid, app, `${prefix}dv`)]) || 0;
        const n = Math.max(judgeCount(app), 1);
        let eSum = 0, eCnt = 0;
        for (let i = 1; i <= n; i++) {
          const v = parseFloat(scores[subKey(rid, gid, app, `${prefix}e${i}`)]);
          if (!isNaN(v) && v > 0) { eSum += v; eCnt++; }
        }
        const eDed = eCnt > 0 ? eSum / eCnt : 0;
        const bon = parseFloat(scores[subKey(rid, gid, app, `${prefix}bon`)]) || 0;
        const pen = parseFloat(scores[subKey(rid, gid, app, `${prefix}pen`)]) || 0;
        if (fin > 0) {
          return `
            <div style="flex:1">
              <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--accent);margin-bottom:4px">${label} <span style="float:right;font-size:12px;font-weight:800;color:var(--text)">${fin.toFixed(3)}</span></div>
              <div class="app-breakdown">
                <div class="bd-cell"><span class="bd-label">D</span><span class="bd-val">${bdFmt(dv)}</span></div>
                <div class="bd-cell"><span class="bd-label">E</span><span class="bd-val">${bdFmt(eDed)}</span></div>
                <div class="bd-cell"><span class="bd-label">B</span><span class="bd-val">${bdFmt(bon)}</span></div>
                <div class="bd-cell"><span class="bd-label">P</span><span class="bd-val${pen > 0 ? " penalty" : ""}">${pen > 0 ? pen.toFixed(2) : "0"}</span></div>
              </div>
            </div>
          `;
        }
        return `
          <div style="flex:1">
            <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--muted);margin-bottom:4px">${label}</div>
            <div class="app-breakdown">
              <div class="bd-cell"><span class="bd-label">D</span><span class="bd-val na">—</span></div>
              <div class="bd-cell"><span class="bd-label">E</span><span class="bd-val na">—</span></div>
              <div class="bd-cell"><span class="bd-label">B</span><span class="bd-val na">—</span></div>
              <div class="bd-cell"><span class="bd-label">P</span><span class="bd-val na">—</span></div>
            </div>
          </div>
        `;
      };

      if (v2HasData) {
        breakdownHtml = `
          <div style="display:flex;gap:8px">${vaultHalf("v1", "Vault 1", v1fin)}${vaultHalf("v2", "Vault 2", v2fin)}</div>
          <div style="text-align:center;margin-top:6px;font-size:11px;font-weight:700;color:var(--muted)">Average <span style="color:var(--accent);font-weight:800;font-size:13px;margin-left:4px">${total > 0 ? total.toFixed(3) : "—"}</span></div>
        `;
      } else {
        breakdownHtml = vaultHalf("v1", "Vault 1", v1fin);
      }
    } else if (fig) {
      const dv = sv(rid, gid, app, "dv");
      const eDeduction = getEDeductionAvg(rid, gid, app);
      const bonus = sv(rid, gid, app, "bon");
      const pen = sv(rid, gid, app, "pen");

      if (total > 0) {
        breakdownHtml = `
          <div class="app-breakdown">
            <div class="bd-cell"><span class="bd-label">D</span><span class="bd-val">${bdFmt(dv)}</span></div>
            <div class="bd-cell"><span class="bd-label">E</span><span class="bd-val">${bdFmt(eDeduction)}</span></div>
            <div class="bd-cell"><span class="bd-label">B</span><span class="bd-val">${bdFmt(bonus)}</span></div>
            <div class="bd-cell"><span class="bd-label">P</span><span class="bd-val${pen > 0 ? " penalty" : ""}">${pen > 0 ? pen.toFixed(2) : "0"}</span></div>
          </div>
        `;
      } else {
        breakdownHtml = `
          <div class="app-breakdown">
            <div class="bd-cell"><span class="bd-label">D</span><span class="bd-val na">—</span></div>
            <div class="bd-cell"><span class="bd-label">E</span><span class="bd-val na">—</span></div>
            <div class="bd-cell"><span class="bd-label">B</span><span class="bd-val na">—</span></div>
            <div class="bd-cell"><span class="bd-label">P</span><span class="bd-val na">—</span></div>
          </div>
        `;
      }
    } else {
      // Simple mode — no D/E breakdown available
      breakdownHtml = `
        <div class="app-breakdown">
          <div class="bd-cell"><span class="bd-label">D</span><span class="bd-val na">N/A</span></div>
          <div class="bd-cell"><span class="bd-label">E</span><span class="bd-val na">N/A</span></div>
          <div class="bd-cell"><span class="bd-label">B</span><span class="bd-val na">N/A</span></div>
          <div class="bd-cell"><span class="bd-label">P</span><span class="bd-val na">N/A</span></div>
        </div>
      `;
    }

    let queryHtml = "";
    if (isQueried && !isResolved) {
      queryHtml = `<span class="query-flag flagged">Under Review</span>`;
      if (queryNote) queryHtml += `<div class="query-note">${escHtml(queryNote)}</div>`;
    } else if (isResolved) {
      queryHtml = `<span class="query-flag resolved">Query Resolved</span>`;
    }

    return `
      <div class="${blockClass}">
        <div class="app-top">
          <span class="app-name">${escHtml(app)}</span>
          <span class="${scoreClass}">${displayVal}</span>
        </div>
        ${breakdownHtml}
        ${queryHtml}
      </div>
    `;
  }

  function renderGymnastCard(rid, g) {
    const overall = getOverall(rid, g.id);
    const apparatus = compData.apparatus || [];

    const appBlocksHtml = apparatus
      .map(app => renderApparatusBlock(rid, g.id, app))
      .join("");

    return `
      <div class="gymnast-card">
        <div class="gymnast-header">
          <div class="gymnast-num">${escHtml(String(g.number || "—"))}</div>
          <div class="gymnast-name">${escHtml(g.name)}</div>
          ${g.club ? `<div class="gymnast-club" style="background:${clubColour(g.club)}">${escHtml(g.club)}</div>` : ""}
          <div class="gymnast-overall">
            <div class="gymnast-overall-label">Overall</div>
            <div class="gymnast-overall-val">${overall > 0 ? overall.toFixed(3) : "—"}</div>
          </div>
        </div>
        <div class="apparatus-grid">${appBlocksHtml}</div>
      </div>
    `;
  }

  function buildRankGroups(rid) {
    const roundG = gymnasts.filter(g => g.round === rid);
    const map = {};
    roundG.forEach(g => {
      const levelObj = (compData.levels || []).find(l => l.id === g.level);
      const levelName = levelObj ? levelObj.name : "Unknown";
      const rankBy = levelObj ? (levelObj.rankBy || "level") : "level";
      const ageLabel = rankBy === "level+age" ? (g.age || "Unknown") : "";
      const key = `${levelName}|||${ageLabel}`;
      if (!map[key]) map[key] = { levelName, ageLabel, gymnasts: [] };
      map[key].gymnasts.push(g);
    });
    const levelOrder = (compData.levels || []).map(l => l.name);
    return Object.entries(map)
      .sort(([a], [b]) => {
        const aLevel = a.split("|||")[0];
        const bLevel = b.split("|||")[0];
        const ai = levelOrder.indexOf(aLevel);
        const bi = levelOrder.indexOf(bLevel);
        return (ai === -1 ? 999 : ai) - (bi === -1 ? 999 : bi);
      })
      .map(([, val]) => val);
  }

  function buildRoundContent(round) {
    const rid = round.id;
    const roundGymnasts = gymnasts.filter(g => g.round === rid);

    if (!roundGymnasts.length) {
      return `<div style="color:var(--muted);font-size:13px;padding:20px 0">No gymnasts in this round.</div>`;
    }

    const allGroups = buildRankGroups(rid);

    // In "myclub" view, filter to authed club only
    const groups = allGroups.map(rg => {
      let filtered = rg.gymnasts;
      if (activeView === "myclub" && authedClubName) {
        filtered = filtered.filter(g => (g.club || "") === authedClubName);
      } else if (clubFilter !== "all") {
        filtered = filtered.filter(g => (g.club || "") === clubFilter);
      }
      return { ...rg, gymnasts: filtered };
    }).filter(rg => rg.gymnasts.length > 0);

    if (!groups.length) {
      return `${buildFilterHtml()}<div style="color:var(--muted);font-size:13px;padding:20px 0;text-align:center">No gymnasts from your club in this round.</div>`;
    }

    return buildFilterHtml() + groups.map(({ levelName, ageLabel, gymnasts: glist }) => {
      const agePill = ageLabel ? `<span class="age-pill">${escHtml(ageLabel)}</span>` : "";
      const sortedGymnasts = [...glist].sort((a, b) => (a.number || 0) - (b.number || 0));
      return `
        <div class="level-section">
          <div class="level-heading">${escHtml(levelName)}${agePill}</div>
          ${sortedGymnasts.map(g => renderGymnastCard(rid, g)).join("")}
        </div>
      `;
    }).join("");
  }

  function renderPage() {
    const rounds = compData.rounds || [];
    if (!activeRound && rounds.length) activeRound = rounds[0].id;

    const roundBtns = rounds.length > 1 ? rounds.map(r => `
      <button class="tab-btn ${r.id === activeRound ? "active" : ""}"
        onclick="switchRound('${r.id}')">${escHtml(r.name)}</button>
    `).join("") : "";

    const currentRound = rounds.find(r => r.id === activeRound) || rounds[0];
    const roundContent = currentRound
      ? (activeView === "overall" ? renderOverallView(currentRound) : buildRoundContent(currentRound))
      : "";

    // Re-resolve club name in case it was renamed
    resolveClubName();

    const colour = "#000dff";
    const dateStr = compData.date
      ? new Date(compData.date + "T12:00:00").toLocaleDateString("en-GB", { weekday: "long", day: "numeric", month: "long", year: "numeric" })
      : "";
    const venue = compData.venue || compData.location || "";

    const fig = true;
    const queryCount = countActiveQueries();

    document.getElementById("main").innerHTML = `
      <div class="comp-hero">
        <div class="comp-title">${escHtml(compData.name || "Competition")}</div>
        <div class="comp-meta">
          ${dateStr ? `<span style="display:flex;align-items:center;gap:6px"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="12" height="11" rx="1.5"/><path d="M2 7h12M5 1v4M11 1v4"/></svg>${dateStr}</span>` : ""}
          ${venue ? `<span style="display:flex;align-items:center;gap:6px"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8 1.5a4.5 4.5 0 014.5 4.5c0 3.5-4.5 8.5-4.5 8.5S3.5 9.5 3.5 6A4.5 4.5 0 018 1.5z"/><circle cx="8" cy="6" r="1.5"/></svg>${escHtml(venue)}</span>` : ""}
          ${fig ? `<span style="color:var(--accent2);font-weight:700">D/E Scoring</span>` : ""}
        </div>
        ${roundBtns ? `<div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:12px">${roundBtns}</div>` : ""}
      </div>

      ${queryCount > 0 ? `
        <div class="info-bar" style="border-color:rgba(245,158,11,0.3);background:rgba(245,158,11,0.04)">
          <span style="color:var(--warn);font-weight:700">⚠ ${queryCount} active ${queryCount === 1 ? "query" : "queries"} under review</span>
        </div>
      ` : ""}

      <div class="view-toggle">
        <button class="toggle-btn ${activeView === "myclub" ? "active" : ""}" onclick="switchView('myclub')">My Club</button>
        <button class="toggle-btn ${activeView === "overall" ? "active" : ""}" onclick="switchView('overall')">Overall</button>
        <div style="flex:1"></div>
        <button class="switch-club-btn" onclick="switchClub()">Switch Club</button>
      </div>

      ${roundContent}
    `;
  }

  function countActiveQueries() {
    let count = 0;
    gymnasts.forEach(g => {
      (compData.apparatus || []).forEach(app => {
        (compData.rounds || []).forEach(r => {
          if (scores[subKey(r.id, g.id, app, "query")] && !scores[subKey(r.id, g.id, app, "queryResolved")]) {
            count++;
          }
        });
      });
    });
    return count;
  }

  function switchRound(rid) {
    activeRound = rid;
    renderPage();
  }

  function updateTimestamp() {
    const el = document.getElementById("lastUpdated");
    if (el) el.textContent = "Updated " + new Date().toLocaleTimeString("en-GB", { hour: "2-digit", minute: "2-digit", second: "2-digit" });
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  async function poll() {
    const [row, tableRows] = await Promise.all([fetchData(), fetchTableScores()]);
    if (!row || !row.data) return;
    compData = row.data.compData || {};
    gymnasts = row.data.gymnasts || [];
    // Scores come exclusively from the scores table
    scores = tableRows.length > 0 ? scoresToFlat(tableRows) : {};
    renderPage();
    updateTimestamp();
  }

  async function init() {
    if (!compId) {
      document.getElementById("main").innerHTML = `
        <div class="state-full">
          <div class="state-icon">🔗</div>
          <div class="state-title">No competition ID</div>
          <div class="state-sub">Please open this link from the competition dashboard. The URL should include <code>?comp=…</code></div>
        </div>`;
      return;
    }

    // Fetch comp data first (needed for lock screen validation)
    const [row, tableRows] = await Promise.all([fetchData(), fetchTableScores()]);
    if (!row || !row.data) {
      document.getElementById("main").innerHTML = `
        <div class="state-full">
          <div class="state-icon">⚠️</div>
          <div class="state-title">Competition not found</div>
          <div class="state-sub">Please check your link or contact the event organiser.</div>
        </div>`;
      return;
    }

    compData = row.data.compData || {};
    gymnasts = row.data.gymnasts || [];
    scores = tableRows.length > 0 ? scoresToFlat(tableRows) : {};

    // Check for saved session
    let savedCode = null;
    try { savedCode = sessionStorage.getItem("coach_club_" + compId); } catch {}

    if (savedCode) {
      const club = (compData.clubs || []).find(c => c.clubCode === savedCode);
      if (club) {
        authedClubCode = savedCode;
        authedClubName = club.name;
        activeView = "myclub";
        showClubHeader();
        renderPage();
        updateTimestamp();
        document.getElementById("livePill").style.display = "flex";
        pollTimer = setInterval(() => poll(), POLL_MS);
        return;
      }
      // Saved code no longer valid — clear it
      try { sessionStorage.removeItem("coach_club_" + compId); } catch {}
    }

    // No valid session — show lock screen
    renderLockScreen();
  }

  init();
</script>
</body>
</html>

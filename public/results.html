<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GYMCOMP — Live Results</title>
  <style>
    @font-face {
      font-family: 'Saans';
      src: url('./SaansVF.woff2') format('woff2');
      font-weight: 100 900;
      font-style: normal;
      font-display: swap;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f5f5;
      --surface: #ffffff;
      --border: #dadada;
      --text: #2e2e2e;
      --muted: #8a8a8a;
      --accent: #000dff;
      --accent-text: #ffffff;
      --accent-overlay: rgba(255,255,255,0.2);
      --accent-pill-bg: #cbcbff;
      --accent-pill-border: #000dff;
      --accent-pill-text: #000dff;
      --success: #22c55e;
      --font: 'Saans', system-ui, -apple-system, sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
    }

    /* ── Page layout ───────────────────────────────────────── */
    .page {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px 20px 40px;
    }

    /* ── Header band ───────────────────────────────────────── */
    .header-band {
      background: var(--accent);
      border-radius: 21px;
      padding: 32px 32px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 24px;
      min-height: 140px;
    }
    .header-band-text { flex: 1; min-width: 0; }
    .header-title-row {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 6px;
    }
    .header-comp-title {
      font-size: 36px;
      font-weight: 600;
      line-height: 1.1;
      color: var(--accent-text);
    }
    .live-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--accent-overlay);
      color: var(--accent-text);
      font-size: 12px;
      font-weight: 600;
      padding: 6px 14px;
      border-radius: 48px;
      white-space: nowrap;
    }
    .live-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--success);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .header-organiser {
      font-size: 16px;
      font-weight: 500;
      color: var(--accent-text);
      opacity: 0.85;
      margin-bottom: 4px;
    }
    .header-meta {
      font-size: 14px;
      color: var(--accent-text);
      opacity: 0.5;
    }
    .header-logo {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: auto;
    }
    .header-logo img {
      max-height: 200px;
      max-width: 280px;
      width: auto;
      object-fit: contain;
      display: block;
    }
    .header-logo img.default-logo { width: 200px; }
    .powered-by {
      display: flex;
      align-items: center;
      gap: 5px;
      margin-top: 24px;
      font-size: 11px;
      color: var(--accent-text);
    }
    .powered-by img {
      height: 18px;
      width: auto;
    }

    /* ── Round tabs ─────────────────────────────────────────── */
    .round-tabs {
      display: flex;
      justify-content: flex-end;
      gap: 24px;
      margin-bottom: 20px;
    }
    .round-tab {
      padding: 8px 4px;
      background: none;
      border: none;
      border-bottom: 1px solid transparent;
      color: var(--text);
      opacity: 0.5;
      font-family: var(--font);
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .round-tab:hover { opacity: 0.8; }
    .round-tab.active {
      opacity: 1;
      border-bottom-color: var(--text);
    }

    /* ── Controls row ──────────────────────────────────────── */
    .controls-row {
      display: flex;
      align-items: flex-end;
      gap: 24px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .control-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .control-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
    }
    .control-pills {
      display: flex;
      gap: 6px;
    }
    .sort-pill {
      padding: 8px 18px;
      border-radius: 48px;
      font-family: var(--font);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      border: 1.5px solid transparent;
      transition: all 0.15s;
      background: #e3e3e3;
      color: #202020;
    }
    .sort-pill.active {
      background: #000;
      border-color: #000;
      color: #fff;
    }
    .control-filters {
      display: flex;
      gap: 8px;
      margin-left: auto;
    }
    .filter-select {
      font-family: var(--font);
      font-size: 14px;
      font-weight: 400;
      padding: 8px 36px 8px 16px;
      border: 1px solid var(--border);
      border-radius: 48px;
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
      min-width: 120px;
      background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%23909090' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
      background-repeat: no-repeat;
      background-position: right 14px center;
    }
    .filter-select:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }
    .filter-select.level-select { min-width: 207px; }
    .filter-clear {
      font-family: var(--font);
      font-size: 12px;
      font-weight: 600;
      padding: 8px 12px;
      border: none;
      border-radius: 48px;
      background: none;
      color: var(--muted);
      cursor: pointer;
    }
    .filter-clear:hover { color: var(--text); }

    /* ── Level card ─────────────────────────────────────────── */
    .level-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 32px;
      margin-bottom: 16px;
    }
    .level-title-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    .level-name {
      font-size: 24px;
      font-weight: 500;
      color: #000;
    }
    .age-pill {
      font-size: 16px;
      font-weight: 400;
      color: #000;
      padding: 8px 16px;
      border-radius: 200px;
      border: 1px solid #000;
      line-height: 1;
    }
    .level-divider {
      border: none;
      border-top: 1px solid var(--border);
      margin-bottom: 16px;
    }

    /* ── Apparatus sub-section (Per Apparatus view) ─────────── */
    .app-section {
      margin-bottom: 20px;
    }
    .app-section:last-child { margin-bottom: 0; }
    .app-label {
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    /* ── Column headers ────────────────────────────────────── */
    .col-header {
      display: flex;
      align-items: center;
      padding: 6px 16px;
      margin-bottom: 4px;
    }
    .col-header span {
      font-size: 12px;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--muted);
    }
    .ch-badge { width: 54px; flex-shrink: 0; }
    .ch-name { flex: 1; min-width: 0; }
    .ch-score { width: 80px; text-align: center; flex-shrink: 0; }
    .ch-total { width: 115px; text-align: center; flex-shrink: 0; }

    /* ── Pill row ──────────────────────────────────────────── */
    .pill-row {
      display: flex;
      align-items: center;
      border: 1.5px solid var(--border);
      border-radius: 54px;
      padding: 8px 16px;
      margin-bottom: 4px;
      background: #fff;
      min-height: 48px;
    }
    .pill-row.dns-row { opacity: 0.45; }

    .col-badge {
      width: 54px;
      flex-shrink: 0;
      display: flex;
      justify-content: center;
    }
    .rank-badge {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      color: #000;
    }
    .dns-badge {
      border: 1.5px solid #aaa;
      color: #aaa;
      background: #fff;
      font-size: 10px;
      font-weight: 700;
    }
    .col-name {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      padding-right: 8px;
    }
    .g-name {
      font-size: 14px;
      font-weight: 600;
      color: #111;
      display: block;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .g-club {
      font-size: 12px;
      font-weight: 400;
      color: var(--muted);
      display: block;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .col-score {
      width: 80px;
      text-align: center;
      font-size: 14px;
      color: #555;
      flex-shrink: 0;
    }
    .score-inner {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 4px;
      margin: 0 2px;
    }
    .col-total {
      width: 115px;
      text-align: center;
      font-size: 16px;
      font-weight: 800;
      color: #111;
      flex-shrink: 0;
    }
    .no-score { color: #ccc; }

    /* ── Footer band ───────────────────────────────────────── */
    .footer-band {
      background: var(--accent);
      border-radius: 21px;
      padding: 24px 32px;
      min-height: 81px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 8px;
    }
    .footer-powered {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--accent-text);
      opacity: 0.7;
    }
    .footer-band img {
      height: 20px;
      width: auto;
      display: block;
    }

    /* ── Empty / loading / error states ────────────────────── */
    .state-full {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      flex-direction: column;
      gap: 16px;
      text-align: center;
      padding: 40px 20px;
    }
    .state-icon { font-size: 48px; margin-bottom: 8px; }
    .state-title { font-size: 20px; font-weight: 700; }
    .state-sub { color: var(--muted); font-size: 14px; max-width: 380px; line-height: 1.6; }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .empty-msg {
      color: var(--muted);
      text-align: center;
      padding: 40px;
      font-size: 14px;
    }

    /* ── Scrollable score columns on mobile ─────────────────── */
    .pill-row-scroll-wrapper {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    /* ── Mobile ≤768px ─────────────────────────────────────── */
    @media (max-width: 768px) {
      .header-band {
        padding: 20px;
        border-radius: 16px;
        min-height: auto;
        flex-direction: column;
        align-items: flex-start;
        gap: 16px;
      }
      .header-comp-title { font-size: 24px; }
      .header-organiser { font-size: 14px; }
      .header-meta { font-size: 12px; }
      .header-band { flex-direction: column-reverse; gap: 32px; }
      .header-logo { align-self: stretch; flex-direction: row; align-items: center; justify-content: space-between; gap: 12px; }
      .header-logo img { max-height: 80px; max-width: 200px; }
      .powered-by { margin-top: 0; flex-direction: column; align-items: flex-end; }

      .controls-row {
        flex-direction: column;
        align-items: stretch;
        gap: 16px;
      }
      .control-filters {
        margin-left: 0;
        flex-wrap: wrap;
      }
      .filter-select { flex: 1; min-width: 0 !important; }

      .level-card {
        padding: 16px;
        border-radius: 12px;
      }
      .level-name { font-size: 18px; }
      .age-pill { font-size: 13px; padding: 5px 12px; }

      .ch-score { width: 64px; }
      .col-score { width: 64px; font-size: 12px; }
      .ch-total { width: 80px; }
      .col-total { width: 80px; font-size: 14px; }
      .rank-badge { width: 28px; height: 28px; font-size: 12px; }
      .col-badge { width: 40px; }
      .ch-badge { width: 40px; }
      .g-name { font-size: 13px; }
      .g-club { font-size: 12px; }
      .col-name { min-width: 120px; flex-shrink: 0; }
      .pill-row { padding: 6px 10px; min-height: 40px; border-radius: 32px; }
      .pill-row-scroll-wrapper { overflow-x: auto; -webkit-overflow-scrolling: touch; }
      .pill-row-scroll-inner { display: inline-flex; flex-direction: column; min-width: 100%; }
      .level-card { overflow: hidden; }

      .footer-band {
        border-radius: 12px;
        padding: 16px;
        min-height: 60px;
      }
    }
  </style>
</head>
<body>

<main class="page" id="main">
  <div class="state-full">
    <div class="spinner"></div>
    <div class="state-title">Loading…</div>
  </div>
</main>

<script>
  const SUPABASE_URL = "https://xjuwbgitqsvrmoejvzwb.supabase.co";
  const SUPABASE_KEY = "sb_publishable_7jhhejhXAH8hlX-gnsElnA_1ih0G-2f";
  const POLL_MS = 10000;

  let activeRound = null;
  let activeView = "apparatus"; // "apparatus" | "overall"
  let levelFilter = "all";
  let ageFilter = "all";
  let compData = null;
  let gymnasts = [];
  let scores = {};

  // ── Contrast utility (mirrors src/lib/utils.js) ──
  function getContrastTextColor(hex) {
    if (!hex || hex.length < 7) return "#ffffff";
    const r = parseInt(hex.slice(1, 3), 16) / 255;
    const g = parseInt(hex.slice(3, 5), 16) / 255;
    const b = parseInt(hex.slice(5, 7), 16) / 255;
    const toLinear = c => c <= 0.03928 ? c / 12.92 : Math.pow((c + 0.055) / 1.055, 2.4);
    const L = 0.2126 * toLinear(r) + 0.7152 * toLinear(g) + 0.0722 * toLinear(b);
    return L > 0.179 ? "#000000" : "#ffffff";
  }

  // ── Apply branding CSS variables ──
  function applyBranding(cd) {
    const brandColor = cd.brandColor || "";
    const accent = brandColor || "#000dff";
    const accentText = brandColor ? getContrastTextColor(brandColor) : "#ffffff";
    const isLight = accentText === "#000000";

    const rr = parseInt(accent.slice(1, 3), 16);
    const gg = parseInt(accent.slice(3, 5), 16);
    const bb = parseInt(accent.slice(5, 7), 16);

    const root = document.documentElement.style;
    root.setProperty("--accent", accent);
    root.setProperty("--accent-text", accentText);
    root.setProperty("--accent-overlay", isLight ? "rgba(0,0,0,0.08)" : "rgba(255,255,255,0.2)");
    root.setProperty("--accent-pill-bg", isLight ? `rgba(${rr},${gg},${bb},0.15)` : "#cbcbff");
    root.setProperty("--accent-pill-border", accent);
    root.setProperty("--accent-pill-text", accent);
  }

  const params = new URLSearchParams(location.search);
  const compId = params.get("comp");

  // ── Score helpers ──
  const sk = (rid, gid, app) => `${rid}__${gid}__${app}`;
  const getScore = (rid, gid, app) => parseFloat(scores[sk(rid, gid, app)]) || 0;
  const getScoringApparatus = () => (compData?.apparatus || []).filter(a => a !== "Rest");
  const getTotal = (rid, gid) => getScoringApparatus().reduce((s, a) => s + getScore(rid, gid, a), 0);

  // Dual-vault per-vault finals (display only). Flag-driven — never reads vaultMode.
  // The combined total stays the ranked value; this just shows both vault finals.
  function vaultFinalsHtml(rid, gid, app, total) {
    if (scores[`${sk(rid, gid, app)}__dualVault`] !== "1") return "";
    const v1 = parseFloat(scores[`${sk(rid, gid, app)}__v1fin`]) || 0;
    const v2 = parseFloat(scores[`${sk(rid, gid, app)}__v2fin`]) || 0;
    if (v1 <= 0 && v2 <= 0) return "";
    const counts = v => v > 0 && Math.round(v * 1000) === Math.round((total || 0) * 1000);
    const line = (label, v) => v > 0
      ? `<div style="font-weight:${counts(v) ? 700 : 500};color:${counts(v) ? "var(--accent)" : "var(--muted)"}">${label} ${v.toFixed(3)}</div>`
      : "";
    return `<div style="font-size:9px;margin-top:2px;line-height:1.3;color:var(--muted);font-family:var(--font)">${line("V1", v1)}${line("V2", v2)}</div>`;
  }

  // A single Vault 1 / Vault 2 column cell for the per-apparatus Vault table.
  // Flag-driven; the counting vault (final equal to the total) is emphasised.
  function vaultColCellHtml(rid, gid, app, prefix, total) {
    if (scores[`${sk(rid, gid, app)}__dualVault`] !== "1")
      return `<div class="col-score"><span class="score-inner"><span class="no-score">—</span></span></div>`;
    const v = parseFloat(scores[`${sk(rid, gid, app)}__${prefix}fin`]) || 0;
    const hot = v > 0 && Math.round(v * 1000) === Math.round((total || 0) * 1000);
    const style = hot ? "color:var(--accent);font-weight:700;" : "";
    return `<div class="col-score"><span class="score-inner" style="${style}">${v > 0 ? v.toFixed(3) : '<span class="no-score">—</span>'}</span></div>`;
  }

  // ── Competition ranking. Equal scores share a rank. ──
  // "standard" (default): next rank skips tied places (1, 1, 3)
  // "dense": next rank does not skip (1, 1, 2)
  function standardRank(items, scoreKey) {
    const mode = (compData && compData.rankingMode) || "standard";
    // Quantise to 3dp for comparison only, so totals identical on screen tie.
    const q = (item) => Math.round((Number(item[scoreKey]) || 0) * 1000) / 1000;
    const sorted = [...items].sort((a, b) => q(b) - q(a));
    let rank = 1;
    return sorted.map((item, i) => {
      if (i > 0 && q(sorted[i]) < q(sorted[i - 1])) {
        rank = mode === "dense" ? rank + 1 : i + 1;
      }
      return { ...item, rank };
    });
  }

  function escHtml(str) {
    return String(str || "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  function getUniqueLevels(rid) {
    const roundG = gymnasts.filter(g => g.round === rid);
    const present = new Set(roundG.map(g => {
      const lo = (compData.levels || []).find(l => l.id === g.level);
      return lo ? lo.name : "Unknown";
    }));
    const ordered = (compData.levels || []).map(l => l.name).filter(n => present.has(n));
    if (present.has("Unknown")) ordered.push("Unknown");
    return ordered;
  }

  function getUniqueAges(rid) {
    const roundG = gymnasts.filter(g => g.round === rid);
    const selectedLevelObj = (compData.levels || []).find(l => l.name === levelFilter);
    if (!selectedLevelObj || selectedLevelObj.rankBy !== "level+age") return [];
    return [...new Set(roundG.filter(g => {
      const lo = (compData.levels || []).find(l => l.id === g.level);
      return (lo ? lo.name : "Unknown") === levelFilter;
    }).map(g => g.age || "Unknown"))].sort();
  }

  function isAgeFilterEnabled() {
    if (levelFilter === "all") return false;
    const lo = (compData.levels || []).find(l => l.name === levelFilter);
    return lo && lo.rankBy === "level+age";
  }

  // Strip "(WAG)" / "(MAG)" suffix from apparatus names
  const shortApp = a => a.replace(/\s*\([A-Z]+\)\s*$/, "");

  function setLevelFilterVal(val) {
    levelFilter = val;
    ageFilter = "all";
    renderPage();
  }

  function setAgeFilterVal(val) {
    ageFilter = val;
    renderPage();
  }

  function clearFilters() {
    levelFilter = "all";
    ageFilter = "all";
    renderPage();
  }

  // ── Build level groups ──
  function buildRankGroups(rid) {
    const roundGymnasts = gymnasts.filter(g => g.round === rid);
    const map = {};
    roundGymnasts.forEach(g => {
      const levelObj = (compData.levels || []).find(l => l.id === g.level);
      const levelName = levelObj ? levelObj.name : "Unknown";
      const rankBy = levelObj ? (levelObj.rankBy || "level") : "level";
      const ageLabel = rankBy === "level+age" ? (g.age || "Unknown") : "";
      const key = `${levelName}|||${ageLabel}`;
      if (!map[key]) map[key] = { levelName, ageLabel, gymnasts: [] };
      map[key].gymnasts.push(g);
    });
    const levelOrder = (compData.levels || []).map(l => l.name);
    return Object.entries(map)
      .sort(([a], [b]) => {
        const aLevel = a.split("|||")[0];
        const bLevel = b.split("|||")[0];
        const ai = levelOrder.indexOf(aLevel);
        const bi = levelOrder.indexOf(bLevel);
        return (ai === -1 ? 999 : ai) - (bi === -1 ? 999 : bi);
      })
      .map(([, val]) => val);
  }

  // ── Medal style (matches PDF exactly) ──
  function medalStyle(rank) {
    if (rank === 1) return { bg: "rgba(244,196,40,0.1)",  border: "transparent", badgeBg: "#ffc300", badgeText: "#000" };
    if (rank === 2) return { bg: "rgba(171,171,171,0.1)", border: "transparent", badgeBg: "#c4c4c4", badgeText: "#000" };
    if (rank === 3) return { bg: "rgba(203,138,85,0.1)",  border: "transparent", badgeBg: "#eba569", badgeText: "#000" };
    if (rank <= 6)  return { bg: "#fff",                  border: "#efefef", badgeBg: "#f1eded", badgeText: "#000" };
    return              { bg: "#fff",                  border: "#efefef", badgeBg: "#fff",    badgeText: "#000" };
  }

  // ── Pill row HTML ──
  function pillRow(g, rank, apparatus, rid, levelMax, isOverall) {
    const m = medalStyle(rank);
    const badgeBorder = rank > 6 ? `border:1.5px solid ${m.border};` : "";

    const scoreCells = apparatus.map(a => {
      const s = getScore(rid, g.id, a);
      const isGroupBest = isOverall && s > 0 && levelMax[a] && s === levelMax[a];
      const hlBg = isGroupBest ? "background:#e3e3e3;" : "";
      const hlFw = isGroupBest ? "font-weight:600;" : "";
      return `<div class="col-score"><span class="score-inner" style="${hlBg}${hlFw}">${s > 0 ? s.toFixed(3) : '<span class="no-score">—</span>'}</span>${s > 0 ? vaultFinalsHtml(rid, g.id, a, s) : ""}</div>`;
    }).join("");

    const totalVal = isOverall
      ? `<div class="col-total">${g.total.toFixed(3)}</div>`
      : `<div class="col-total"><span class="score-inner">${g.score > 0 ? g.score.toFixed(3) : '<span class="no-score">—</span>'}</span></div>`;

    return `<div class="pill-row" style="background:${m.bg};border-color:${m.border};">
      <div class="col-badge"><div class="rank-badge" style="background:${m.badgeBg};color:${m.badgeText};${badgeBorder}">${rank}</div></div>
      <div class="col-name"><span class="g-name">${escHtml(g.name)}</span><span class="g-club">${escHtml(g.club || "")}</span></div>
      ${scoreCells}
      ${totalVal}
    </div>`;
  }

  function dnsRow(g, apparatus, isOverall) {
    const label = g.dns ? "DNS" : (g.withdrawn ? "WD" : "DNS");
    const scoreCells = apparatus.map(() =>
      `<div class="col-score"><span class="score-inner"><span class="no-score">—</span></span></div>`
    ).join("");
    return `<div class="pill-row dns-row">
      <div class="col-badge"><div class="rank-badge dns-badge">${label}</div></div>
      <div class="col-name"><span class="g-name">${escHtml(g.name)}</span><span class="g-club">${escHtml(g.club || "")}</span></div>
      ${scoreCells}
      <div class="col-total"><span class="no-score">—</span></div>
    </div>`;
  }

  // ── Column headers ──
  function colHeaderHtml(apparatus, isOverall) {
    const appCols = apparatus.map(a => `<span class="ch-score">${escHtml(shortApp(a))}</span>`).join("");
    return `<div class="col-header">
      <span class="ch-badge"></span>
      <span class="ch-name">Gymnast</span>
      ${appCols}
      <span class="ch-total">${isOverall ? "Total" : "Score"}</span>
    </div>`;
  }

  // ── Apparatus view ──
  function renderApparatusView(rid) {
    const allGroups = buildRankGroups(rid);
    const groups = allGroups.filter(rg => {
      if (levelFilter !== "all" && rg.levelName !== levelFilter) return false;
      if (ageFilter !== "all" && rg.ageLabel !== ageFilter) return false;
      return true;
    });
    const apparatus = getScoringApparatus();
    if (!groups.length) return `<div class="empty-msg">No results to display yet.</div>`;

    return groups.map(({ levelName, ageLabel, gymnasts: glist }) => {
      const titleRow = `<div class="level-title-row">
        <span class="level-name">${escHtml(levelName)}</span>
        ${ageLabel ? `<span class="age-pill">${escHtml(ageLabel)}</span>` : ""}
      </div>
      <div class="level-divider"></div>`;

      const appSections = apparatus.map(app => {
        const withScores = glist.map(g => ({ ...g, score: getScore(rid, g.id, app) }));
        const ranked = standardRank(withScores.filter(g => g.score > 0 && !g.dns && !g.withdrawn), "score");
        const dns = withScores.filter(g => g.score === 0 || g.dns || g.withdrawn);
        // Dual-vault section → break the two vault finals out into columns.
        const showVaultCols = [...ranked, ...dns].some(g => scores[`${sk(rid, g.id, app)}__dualVault`] === "1");
        const vaultCols = (g) => showVaultCols
          ? `${vaultColCellHtml(rid, g.id, app, "v1", g.score)}${vaultColCellHtml(rid, g.id, app, "v2", g.score)}`
          : "";
        const dnsVaultCols = showVaultCols
          ? `<div class="col-score"><span class="score-inner"><span class="no-score">—</span></span></div><div class="col-score"><span class="score-inner"><span class="no-score">—</span></span></div>`
          : "";

        const rows = ranked.map(g => {
          const m = medalStyle(g.rank);
          const badgeBorder = g.rank > 6 ? `border:1.5px solid ${m.border};` : "";
          return `<div class="pill-row" style="background:${m.bg};border-color:${m.border};">
            <div class="col-badge"><div class="rank-badge" style="background:${m.badgeBg};color:${m.badgeText};${badgeBorder}">${g.rank}</div></div>
            <div class="col-name"><span class="g-name">${escHtml(g.name)}</span><span class="g-club">${escHtml(g.club || "")}</span></div>
            ${vaultCols(g)}
            <div class="col-total">${g.score.toFixed(3)}</div>
          </div>`;
        }).join("");

        const dnsRows = dns.map(g => {
          return `<div class="pill-row dns-row">
            <div class="col-badge">${(g.dns || g.withdrawn) ? `<div class="rank-badge dns-badge">${g.dns ? "DNS" : "WD"}</div>` : ""}</div>
            <div class="col-name"><span class="g-name">${escHtml(g.name)}</span><span class="g-club">${escHtml(g.club || "")}</span></div>
            ${dnsVaultCols}
            <div class="col-total"><span class="no-score">—</span></div>
          </div>`;
        }).join("");

        const header = `<div class="col-header">
            <span class="ch-badge"></span>
            <span class="ch-name">Gymnast</span>
            ${showVaultCols ? `<span class="ch-score">Vault 1</span><span class="ch-score">Vault 2</span>` : ""}
            <span class="ch-total">Score</span>
          </div>`;

        // Dual-vault sections add columns — wrap in a horizontal scroller so the
        // wider table stays readable on narrow screens (matches the Overall view).
        const body = showVaultCols
          ? `<div class="pill-row-scroll-wrapper"><div class="pill-row-scroll-inner">${header}${rows}${dnsRows}</div></div>`
          : `${header}${rows}${dnsRows}`;

        return `<div class="app-section">
          <div class="app-label">${escHtml(shortApp(app))}</div>
          ${body}
        </div>`;
      }).join("");

      return `<div class="level-card">${titleRow}${appSections}</div>`;
    }).join("");
  }

  // ── Overall view ──
  function renderOverallView(rid) {
    const allGroups = buildRankGroups(rid);
    const groups = allGroups.filter(rg => {
      if (levelFilter !== "all" && rg.levelName !== levelFilter) return false;
      if (ageFilter !== "all" && rg.ageLabel !== ageFilter) return false;
      return true;
    });
    const apparatus = getScoringApparatus();
    if (!groups.length) return `<div class="empty-msg">No results to display yet.</div>`;

    return groups.map(({ levelName, ageLabel, gymnasts: glist }) => {
      const titleRow = `<div class="level-title-row">
        <span class="level-name">${escHtml(levelName)}</span>
        ${ageLabel ? `<span class="age-pill">${escHtml(ageLabel)}</span>` : ""}
      </div>
      <div class="level-divider"></div>`;

      const withTotals = glist.map(g => ({ ...g, total: getTotal(rid, g.id) }));
      const ranked = standardRank(withTotals.filter(g => g.total > 0 && !g.dns && !g.withdrawn), "total");
      const dns = withTotals.filter(g => g.total === 0 || g.dns || g.withdrawn);

      // Per-apparatus max for highlight (Overall view only)
      const levelMax = {};
      apparatus.forEach(a => {
        const appScores = ranked.map(g => getScore(rid, g.id, a)).filter(s => s > 0);
        if (appScores.length) levelMax[a] = Math.max(...appScores);
      });

      const header = colHeaderHtml(apparatus, true);

      const rows = ranked.map(g => pillRow(g, g.rank, apparatus, rid, levelMax, true)).join("");
      const dnsRows = dns.map(g => dnsRow(g, apparatus, true)).join("");

      return `<div class="level-card">
        ${titleRow}
        <div class="pill-row-scroll-wrapper">
          <div class="pill-row-scroll-inner">
            ${header}${rows}${dnsRows}
          </div>
        </div>
      </div>`;
    }).join("");
  }

  function renderPage() {
    const rounds = compData.rounds || [];
    if (!activeRound && rounds.length) activeRound = rounds[0].id;

    const brandColor = compData.brandColor || "";
    const accent = brandColor || "#000dff";
    const accentText = brandColor ? getContrastTextColor(brandColor) : "#ffffff";
    const isLight = accentText === "#000000";

    const dateStr = compData.date
      ? new Date(compData.date + "T12:00:00").toLocaleDateString("en-GB", { weekday: "long", day: "numeric", month: "long", year: "numeric" })
      : "";
    const venue = compData.venue || compData.location || "";

    // Brand logo
    const brandLogo = compData.brandLogoSvgUrl || compData.brandLogoUrl || "";
    const defaultLogo = isLight ? "./logo.svg" : "./Logo-mono-white.svg";
    const logoSrc = brandLogo || defaultLogo;
    const footerLogoSrc = isLight ? "./logo.svg" : "./Logo-mono-white.svg";

    // Header band
    const headerHtml = `<div class="header-band">
      <div class="header-band-text">
        <div class="header-title-row">
          <div class="header-comp-title">${escHtml(compData.name || "Competition")}</div>
          <div class="live-pill" id="livePill" style="display:none">
            <span class="live-dot"></span> LIVE
          </div>
        </div>
        ${compData.organiserName ? `<div class="header-organiser">${escHtml(compData.organiserName)}</div>` : ""}
        <div class="header-meta">${[dateStr, escHtml(venue)].filter(Boolean).join("  ·  ")}</div>
      </div>
      <div class="header-logo">
        <img src="${logoSrc}" alt=""${brandLogo ? ' crossorigin="anonymous"' : ""} class="${brandLogo ? '' : 'default-logo'}" />
        ${brandLogo ? `<div class="powered-by">Live Scoring Powered by <img src="${isLight ? "./logo.svg" : "./Logo-mono-white.svg"}" alt="GymComp" /></div>` : ""}
      </div>
    </div>`;

    // Round tabs (hidden if only 1 round)
    const roundTabsHtml = rounds.length > 1 ? `<div class="round-tabs">
      ${rounds.map(r => `<button class="round-tab ${r.id === activeRound ? "active" : ""}"
        onclick="switchRound('${r.id}')">${escHtml(r.name)}</button>`).join("")}
    </div>` : "";

    // Controls row
    const levels = getUniqueLevels(activeRound);
    const ages = getUniqueAges(activeRound);
    const showAge = isAgeFilterEnabled();
    const hasActive = levelFilter !== "all" || ageFilter !== "all";

    // Show filters if multiple levels OR if any level uses level+age ranking
    const anyLevelHasAge = (compData.levels || []).some(l => l.rankBy === "level+age");
    const filtersHtml = (levels.length >= 2 || anyLevelHasAge) ? `
      <div class="control-group control-filters">
        <div class="control-label">Filter by</div>
        <div class="control-pills">
          <select class="filter-select level-select" onchange="setLevelFilterVal(this.value)">
            <option value="all"${levelFilter === "all" ? " selected" : ""}>All Levels</option>
            ${levels.map(l => `<option value="${escHtml(l)}"${l === levelFilter ? " selected" : ""}>${escHtml(l)}</option>`).join("")}
          </select>
          <select class="filter-select" onchange="setAgeFilterVal(this.value)" ${showAge ? "" : "disabled"}>
            <option value="all"${ageFilter === "all" ? " selected" : ""}>All Ages</option>
            ${ages.map(a => `<option value="${escHtml(a)}"${a === ageFilter ? " selected" : ""}>${escHtml(a)}</option>`).join("")}
          </select>
          ${hasActive ? `<button class="filter-clear" onclick="clearFilters()">Clear</button>` : ""}
        </div>
      </div>
    ` : "";

    const controlsHtml = `<div class="controls-row">
      <div class="control-group">
        <div class="control-label">Sort by</div>
        <div class="control-pills">
          <button class="sort-pill ${activeView === "apparatus" ? "active" : ""}" onclick="switchView('apparatus')">Per Apparatus</button>
          <button class="sort-pill ${activeView === "overall" ? "active" : ""}" onclick="switchView('overall')">Overall</button>
        </div>
      </div>
      ${filtersHtml}
    </div>`;

    // Content
    const contentHtml = activeView === "apparatus"
      ? renderApparatusView(activeRound)
      : renderOverallView(activeRound);

    // Footer band
    const footerHtml = `<div class="footer-band">
      <span class="footer-powered">Powered by</span>
      <img id="footerLogo" src="${footerLogoSrc}" alt="GymComp" />
    </div>`;

    document.getElementById("main").innerHTML = `
      ${headerHtml}
      ${roundTabsHtml}
      ${controlsHtml}
      ${contentHtml}
      ${footerHtml}
    `;

    // Show LIVE pill after render
    const livePill = document.getElementById("livePill");
    if (livePill && compData._showLive) livePill.style.display = "inline-flex";
  }

  function switchRound(rid) {
    activeRound = rid;
    levelFilter = "all";
    ageFilter = "all";
    renderPage();
  }

  function switchView(v) {
    activeView = v;
    renderPage();
  }

  function updateTimestamp() {
    const el = document.getElementById("lastUpdated");
    if (el) el.textContent = new Date().toLocaleTimeString("en-GB", { hour: "2-digit", minute: "2-digit", second: "2-digit" });
  }

  async function fetchData() {
    if (!compId) return null;
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/competitions?id=eq.${encodeURIComponent(compId)}&select=*`,
      { headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` } }
    );
    if (!res.ok) return null;
    const rows = await res.json();
    return rows[0] || null;
  }

  // Fetch scores from the dedicated scores table (anon key)
  async function fetchTableScores() {
    if (!compId) return [];
    try {
      const res = await fetch(
        `${SUPABASE_URL}/rest/v1/scores?comp_id=eq.${encodeURIComponent(compId)}&select=*`,
        { headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` } }
      );
      if (!res.ok) return [];
      return await res.json();
    } catch { return []; }
  }

  // Convert scores table rows → flat object
  function scoresToFlat(rows) {
    const flat = {};
    for (const row of rows) {
      const bk = `${row.round_id}__${row.gymnast_id}__${row.apparatus}`;
      flat[bk] = row.final_score != null ? String(row.final_score) : "";

      const eScores = row.e_scores;

      // Dual vault: e_scores is an object. final_score (set above) stays the
      // ranked total; also surface the per-vault finals for display.
      if (eScores && typeof eScores === "object" && !Array.isArray(eScores) && eScores.dualVault) {
        flat[`${bk}__dualVault`] = "1";
        for (const prefix of ["v1", "v2"]) {
          const v = eScores[prefix];
          if (v && v.final != null) flat[`${bk}__${prefix}fin`] = String(v.final);
        }
        continue;
      }

      // Normal score
      if (row.d_score != null) flat[`${bk}__dv`] = String(row.d_score);
      if (row.bonus != null && row.bonus !== 0) flat[`${bk}__bon`] = String(row.bonus);
      if (row.penalty != null && row.penalty !== 0) flat[`${bk}__pen`] = String(row.penalty);
      const eArr = eScores || [];
      if (Array.isArray(eArr)) {
        for (let i = 0; i < eArr.length; i++) {
          if (eArr[i] != null) flat[`${bk}__e${i + 1}`] = String(eArr[i]);
        }
      }
    }
    return flat;
  }

  async function poll() {
    const [row, tableRows] = await Promise.all([fetchData(), fetchTableScores()]);
    if (!row || !row.data) return;
    compData = row.data.compData || {};
    gymnasts = row.data.gymnasts || [];
    scores = tableRows.length > 0 ? scoresToFlat(tableRows) : {};
    compData._showLive = true;
    applyBranding(compData);
    renderPage();
    updateTimestamp();
  }

  async function init() {
    if (!compId) {
      document.getElementById("main").innerHTML = `
        <div class="state-full">
          <div class="state-icon">🔗</div>
          <div class="state-title">No competition ID</div>
          <div class="state-sub">Please open this link from the competition dashboard. The URL should include <code>?comp=…</code></div>
        </div>`;
      return;
    }

    const [row, tableRows] = await Promise.all([fetchData(), fetchTableScores()]);
    if (!row || !row.data) {
      document.getElementById("main").innerHTML = `
        <div class="state-full">
          <div class="state-icon">⚠️</div>
          <div class="state-title">Competition not found</div>
          <div class="state-sub">Please check your link or contact the event organiser.</div>
        </div>`;
      return;
    }

    compData = row.data.compData || {};
    gymnasts = row.data.gymnasts || [];
    scores = tableRows.length > 0 ? scoresToFlat(tableRows) : {};

    compData._showLive = true;
    applyBranding(compData);
    renderPage();
    updateTimestamp();

    setInterval(poll, POLL_MS);
  }

  init();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GYMCOMP — Live Results</title>
  <style>
    @font-face {
      font-family: 'Saans';
      src: url('./SaansVF.woff2') format('woff2');
      font-weight: 100 900;
      font-style: normal;
      font-display: swap;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f5f5;
      --surface: #ffffff;
      --surface2: #f0f0f0;
      --border: #e4e4e4;
      --text: #2e2e2e;
      --muted: #909090;
      --accent: #000dff;
      --accent2: #625FD1;
      --accent3: #d4d3ff;
      --success: #22c55e;
      --gold: #f59e0b;
      --silver: #94a3b8;
      --bronze: #b45309;
      --radius: 12px;
      --font: 'Saans', system-ui, -apple-system, sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
    }

    /* ── Header ─────────────────────────────────────────────── */
    .site-header {
      background: var(--accent);
      padding: 0 20px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .site-header-inner {
      max-width: 960px;
      margin: 0 auto;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .logo {
      font-family: var(--font);
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }
    .view-badge {
      background: rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.9);
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
    }
    .live-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 600;
      color: rgba(255,255,255,0.9);
      margin-left: auto;
    }
    .live-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--success);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ── Layout ──────────────────────────────────────────────── */
    .page {
      max-width: 960px;
      margin: 0 auto;
      padding: 24px 20px 60px;
    }

    /* ── Comp hero ───────────────────────────────────────────── */
    .comp-hero {
      text-align: center;
      margin-bottom: 28px;
    }
    .comp-title {
      font-family: var(--font);
      font-size: 36px;
      font-weight: 800;
      line-height: 1.1;
      margin-bottom: 10px;
    }
    .comp-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      justify-content: center;
      color: var(--muted);
      font-size: 13px;
    }

    /* ── Round tabs ──────────────────────────────────────────── */
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .tab-btn {
      padding: 8px 18px;
      border-radius: 56px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      font-family: var(--font);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }
    .tab-btn:hover { border-color: var(--accent); color: var(--text); }
    .tab-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    /* ── View toggle ─────────────────────────────────────────── */
    .view-toggle {
      display: flex;
      gap: 6px;
      margin-bottom: 24px;
      justify-content: center;
    }
    .toggle-btn {
      padding: 7px 16px;
      border-radius: 56px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      font-family: var(--font);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }
    .toggle-btn.active {
      border-color: transparent;
      background: var(--accent3);
      color: var(--accent);
    }

    /* ── Level card ──────────────────────────────────────────── */
    .level-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 16px;
    }
    .level-card-header {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
    }

    /* ── Apparatus sub-section ───────────────────────────────── */
    .app-section { padding: 16px 20px 0; }
    .app-section:last-child { padding-bottom: 16px; }
    .app-label {
      font-size: 16px;
      font-weight: 500;
      color: var(--accent);
      margin-bottom: 12px;
    }

    /* ── Results table ───────────────────────────────────────── */
    .table-wrap { overflow-x: auto; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    th {
      padding: 8px 12px;
      text-align: left;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    tr.dns-row td { opacity: 0.45; }

    /* ── Rank badge ──────────────────────────────────────────── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 9px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 700;
      white-space: nowrap;
    }
    .badge-gold { background: rgba(245, 158, 11, 0.12); color: #d97706; }
    .badge-silver { background: rgba(148, 163, 184, 0.12); color: #64748b; }
    .badge-bronze { background: rgba(180, 83, 9, 0.12); color: #b45309; }
    .badge-rank { background: var(--surface2); color: var(--muted); }
    .badge-dns { background: rgba(144,144,144,0.1); color: var(--muted); }

    .score-val {
      font-weight: 700;
      font-size: 14px;
    }
    .score-total {
      font-weight: 800;
      font-size: 16px;
      color: var(--accent);
    }
    .app-score {
      color: var(--muted);
      font-size: 12px;
    }
    .gymnast-name { font-weight: 500; }
    .gymnast-club { font-weight: 500; color: var(--muted); }

    /* ── Empty / loading / error states ─────────────────────── */
    .state-full {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      flex-direction: column;
      gap: 16px;
      text-align: center;
      padding: 40px 20px;
    }
    .state-icon { font-size: 48px; margin-bottom: 8px; }
    .state-title { font-size: 20px; font-weight: 700; }
    .state-sub { color: var(--muted); font-size: 14px; max-width: 380px; line-height: 1.6; }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .last-updated {
      font-size: 11px;
      color: rgba(255,255,255,0.6);
    }
    .empty-row td {
      color: var(--muted);
      font-style: italic;
      text-align: center;
      padding: 20px;
    }

    @media (max-width: 600px) {
      .comp-title { font-size: 26px; }
      td, th { padding: 8px; font-size: 12px; }
    }
  </style>
</head>
<body>

<header class="site-header">
  <div class="site-header-inner">
    <div class="logo">GYMCOMP</div>
    <span class="view-badge">Live Results</span>
    <div class="live-pill" id="livePill" style="display:none">
      <span class="live-dot"></span> LIVE
    </div>
    <span class="last-updated" id="lastUpdated"></span>
  </div>
</header>

<main class="page" id="main">
  <div class="state-full">
    <div class="spinner"></div>
    <div class="state-title">Loading…</div>
  </div>
</main>

<script>
  const SUPABASE_URL = "https://xjuwbgitqsvrmoejvzwb.supabase.co";
  const SUPABASE_KEY = "sb_publishable_7jhhejhXAH8hlX-gnsElnA_1ih0G-2f";
  const POLL_MS = 10000;

  let activeRound = null;
  let activeView = "apparatus"; // "apparatus" | "overall"
  let compData = null;
  let gymnasts = [];
  let scores = {};

  const params = new URLSearchParams(location.search);
  const compId = params.get("comp");

  // ── Score helpers ──
  const sk = (rid, gid, app) => `${rid}__${gid}__${app}`;
  const getScore = (rid, gid, app) => parseFloat(scores[sk(rid, gid, app)]) || 0;
  const getTotal = (rid, gid) => (compData.apparatus || []).reduce((s, a) => s + getScore(rid, gid, a), 0);

  // ── Dense ranking ──
  function denseRank(items, scoreKey) {
    const sorted = [...items].sort((a, b) => b[scoreKey] - a[scoreKey]);
    let rank = 1;
    return sorted.map((item, i) => {
      if (i > 0 && sorted[i][scoreKey] < sorted[i - 1][scoreKey]) rank++;
      return { ...item, rank };
    });
  }

  function escHtml(str) {
    return String(str || "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  function rankBadge(rank) {
    if (rank === null) return `<span class="badge badge-dns">DNS</span>`;
    if (rank === 1) return `<span class="badge badge-gold">🥇 1st</span>`;
    if (rank === 2) return `<span class="badge badge-silver">🥈 2nd</span>`;
    if (rank === 3) return `<span class="badge badge-bronze">🥉 3rd</span>`;
    return `<span class="badge badge-rank">${rank}th</span>`;
  }

  // ── Build level groups ──
  function buildRankGroups(rid) {
    const roundGymnasts = gymnasts.filter(g => g.round === rid);
    const map = {};
    roundGymnasts.forEach(g => {
      const levelObj = (compData.levels || []).find(l => l.id === g.level);
      const levelName = levelObj ? levelObj.name : "Unknown";
      const rankBy = levelObj ? (levelObj.rankBy || "level") : "level";
      const ageLabel = rankBy === "level+age" ? (g.age || "Unknown") : "";
      const key = `${levelName}|||${ageLabel}`;
      if (!map[key]) map[key] = { levelName, ageLabel, gymnasts: [] };
      map[key].gymnasts.push(g);
    });
    return Object.entries(map)
      .sort(([a], [b]) => a.localeCompare(b))
      .map(([, val]) => val);
  }

  // ── Apparatus view ──
  function renderApparatusView(rid) {
    const groups = buildRankGroups(rid);
    const apparatus = compData.apparatus || [];
    if (!groups.length) return `<div style="color:var(--muted);text-align:center;padding:40px">No results to display yet.</div>`;

    return groups.map(({ levelName, ageLabel, gymnasts: glist }) => {
      const groupLabel = ageLabel ? `${escHtml(levelName)} <span style="font-size:14px;font-weight:600;color:var(--text);background:rgba(0,13,255,0.06);padding:4px 12px;border-radius:99px;margin-left:8px">${escHtml(ageLabel)}</span>` : escHtml(levelName);

      // Check if any scores exist across all apparatus for this group
      const groupHasScores = apparatus.some(app => glist.some(g => getScore(rid, g.id, app) > 0));

      if (!groupHasScores) {
        return `
          <div class="level-card">
            <div class="level-card-header">${groupLabel}</div>
            <div style="padding:32px 20px;text-align:center;color:var(--muted);font-size:13px">No scores yet</div>
          </div>
        `;
      }

      const appSections = apparatus.map(app => {
        const withScores = glist.map(g => ({ ...g, score: getScore(rid, g.id, app) }));
        const hasSomeScore = withScores.some(g => g.score > 0);
        if (!hasSomeScore) return "";

        const ranked = denseRank(withScores.filter(g => g.score > 0 && !g.dns), "score");
        const dns = withScores.filter(g => g.score === 0 || g.dns);

        const rows = [
          ...ranked.map(g => `
            <tr>
              <td>${rankBadge(g.rank)}</td>
              <td style="color:var(--muted)">${escHtml(String(g.number || ""))}</td>
              <td class="gymnast-name">${escHtml(g.name)}</td>
              <td class="gymnast-club">${escHtml(g.club || "")}</td>
              <td><span class="score-val">${g.score.toFixed(2)}</span></td>
            </tr>
          `),
          ...dns.map(g => `
            <tr class="dns-row">
              <td>${rankBadge(null)}</td>
              <td style="color:var(--muted)">${escHtml(String(g.number || ""))}</td>
              <td>${escHtml(g.name)}</td>
              <td style="color:var(--muted)">${escHtml(g.club || "")}</td>
              <td style="color:var(--muted)">—</td>
            </tr>
          `)
        ].join("");

        return `
          <div class="app-section">
            <div class="app-label">${escHtml(app)}</div>
            <div class="table-wrap">
              <table>
                <thead><tr><th>Rank</th><th>#</th><th>Gymnast</th><th>Club</th><th>Score</th></tr></thead>
                <tbody>${rows}</tbody>
              </table>
            </div>
          </div>
        `;
      }).join("");

      return `
        <div class="level-card">
          <div class="level-card-header">${groupLabel}</div>
          ${appSections}
        </div>
      `;
    }).join("");
  }

  // ── Overall view ──
  function renderOverallView(rid) {
    const groups = buildRankGroups(rid);
    const apparatus = compData.apparatus || [];
    if (!groups.length) return `<div style="color:var(--muted);text-align:center;padding:40px">No results to display yet.</div>`;

    return groups.map(({ levelName, ageLabel, gymnasts: glist }) => {
      const groupLabel = ageLabel ? `${escHtml(levelName)} <span style="font-size:14px;font-weight:600;color:var(--text);background:rgba(0,13,255,0.06);padding:4px 12px;border-radius:99px;margin-left:8px">${escHtml(ageLabel)}</span>` : escHtml(levelName);
      const withTotals = glist.map(g => ({ ...g, total: getTotal(rid, g.id) }));
      const ranked = denseRank(withTotals.filter(g => g.total > 0 && !g.dns), "total");
      const dns = withTotals.filter(g => g.total === 0 || g.dns);

      const appHeaders = apparatus.map(a => `<th>${escHtml(a)}</th>`).join("");

      const rows = [
        ...ranked.map(g => {
          const appCells = apparatus.map(a => {
            const s = getScore(rid, g.id, a);
            return `<td class="app-score">${s > 0 ? s.toFixed(2) : "—"}</td>`;
          }).join("");
          return `
            <tr>
              <td>${rankBadge(g.rank)}</td>
              <td style="color:var(--muted)">${escHtml(String(g.number || ""))}</td>
              <td class="gymnast-name">${escHtml(g.name)}</td>
              <td class="gymnast-club">${escHtml(g.club || "")}</td>
              ${appCells}
              <td><span class="score-total">${g.total.toFixed(2)}</span></td>
            </tr>
          `;
        }),
        ...dns.map(g => {
          const appCells = apparatus.map(() => `<td style="color:var(--muted)">—</td>`).join("");
          return `
            <tr class="dns-row">
              <td>${rankBadge(null)}</td>
              <td style="color:var(--muted)">${escHtml(String(g.number || ""))}</td>
              <td>${escHtml(g.name)}</td>
              <td style="color:var(--muted)">${escHtml(g.club || "")}</td>
              ${appCells}
              <td style="color:var(--muted)">—</td>
            </tr>
          `;
        })
      ].join("");

      const hasAnyScore = withTotals.some(g => g.total > 0);

      if (!hasAnyScore) {
        return `
          <div class="level-card">
            <div class="level-card-header">${groupLabel}</div>
            <div style="padding:20px;color:var(--muted);font-size:13px;font-style:italic">No scores yet</div>
          </div>
        `;
      }

      return `
        <div class="level-card">
          <div class="level-card-header">${groupLabel}</div>
          <div style="padding:16px 20px">
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>Rank</th><th>#</th><th>Gymnast</th><th>Club</th>
                    ${appHeaders}
                    <th>Total</th>
                  </tr>
                </thead>
                <tbody>${rows}</tbody>
              </table>
            </div>
          </div>
        </div>
      `;
    }).join("");
  }

  function renderPage() {
    const rounds = compData.rounds || [];
    if (!activeRound && rounds.length) activeRound = rounds[0].id;

    const colour = compData.brandColour || "#000dff";
    const dateStr = compData.date
      ? new Date(compData.date + "T12:00:00").toLocaleDateString("en-GB", { weekday: "long", day: "numeric", month: "long", year: "numeric" })
      : "";
    const venue = compData.venue || compData.location || "";

    const tabsHtml = rounds.length > 1 ? `
      <div class="tabs">
        ${rounds.map(r => `
          <button class="tab-btn ${r.id === activeRound ? "active" : ""}"
            onclick="switchRound('${r.id}')">${escHtml(r.name)}</button>
        `).join("")}
      </div>
    ` : "";

    const viewToggleHtml = `
      <div class="view-toggle">
        <button class="toggle-btn ${activeView === "apparatus" ? "active" : ""}" onclick="switchView('apparatus')">Per Apparatus</button>
        <button class="toggle-btn ${activeView === "overall" ? "active" : ""}" onclick="switchView('overall')">Overall</button>
      </div>
    `;

    const contentHtml = activeView === "apparatus"
      ? renderApparatusView(activeRound)
      : renderOverallView(activeRound);

    document.getElementById("main").innerHTML = `
      <div class="comp-hero">
        <div class="comp-title" style="color:${colour}">${escHtml(compData.name || "Competition")}</div>
        <div class="comp-meta">
          ${dateStr ? `<span>📅 ${dateStr}</span>` : ""}
          ${venue ? `<span>📍 ${escHtml(venue)}</span>` : ""}
        </div>
      </div>
      ${tabsHtml}
      ${viewToggleHtml}
      ${contentHtml}
    `;
  }

  function switchRound(rid) {
    activeRound = rid;
    renderPage();
  }

  function switchView(v) {
    activeView = v;
    renderPage();
  }

  function updateTimestamp() {
    const el = document.getElementById("lastUpdated");
    if (el) el.textContent = new Date().toLocaleTimeString("en-GB", { hour: "2-digit", minute: "2-digit", second: "2-digit" });
  }

  async function fetchData() {
    if (!compId) return null;
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/competitions?id=eq.${compId}&select=*`,
      { headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` } }
    );
    if (!res.ok) return null;
    const rows = await res.json();
    return rows[0] || null;
  }

  async function poll() {
    const row = await fetchData();
    if (!row || !row.data) return;
    compData = row.data.compData || {};
    gymnasts = row.data.gymnasts || [];
    scores = row.data.scores || {};
    renderPage();
    updateTimestamp();
  }

  async function init() {
    if (!compId) {
      document.getElementById("main").innerHTML = `
        <div class="state-full">
          <div class="state-icon">🔗</div>
          <div class="state-title">No competition ID</div>
          <div class="state-sub">Please open this link from the competition dashboard. The URL should include <code>?comp=…</code></div>
        </div>`;
      return;
    }

    const row = await fetchData();
    if (!row || !row.data) {
      document.getElementById("main").innerHTML = `
        <div class="state-full">
          <div class="state-icon">⚠️</div>
          <div class="state-title">Competition not found</div>
          <div class="state-sub">Please check your link or contact the event organiser.</div>
        </div>`;
      return;
    }

    compData = row.data.compData || {};
    gymnasts = row.data.gymnasts || [];
    scores = row.data.scores || {};

    renderPage();
    updateTimestamp();
    document.getElementById("livePill").style.display = "flex";

    setInterval(poll, POLL_MS);
  }

  init();
</script>
</body>
</html>

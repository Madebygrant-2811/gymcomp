<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GYMCOMP — Live Results</title>
  <style>
    @font-face {
      font-family: 'Saans';
      src: url('./SaansVF.woff2') format('woff2');
      font-weight: 100 900;
      font-style: normal;
      font-display: swap;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f5f5;
      --surface: #ffffff;
      --surface2: #f0f0f0;
      --border: #e4e4e4;
      --text: #2e2e2e;
      --muted: #909090;
      --accent: #000dff;
      --accent2: #625FD1;
      --accent3: #d4d3ff;
      --success: #22c55e;
      --gold: #f59e0b;
      --silver: #94a3b8;
      --bronze: #b45309;
      --radius: 12px;
      --font: 'Saans', system-ui, -apple-system, sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
    }

    /* ── Header ─────────────────────────────────────────────── */
    .site-header {
      background: var(--accent);
      padding: 0 20px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .site-header-inner {
      max-width: 960px;
      margin: 0 auto;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .logo {
      font-family: var(--font);
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }
    .view-badge {
      background: rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.9);
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
    }
    .live-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 600;
      color: rgba(255,255,255,0.9);
      margin-left: auto;
    }
    .live-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--success);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ── Layout ──────────────────────────────────────────────── */
    .page {
      max-width: 960px;
      margin: 0 auto;
      padding: 24px 20px 60px;
    }

    /* ── Comp hero ───────────────────────────────────────────── */
    .comp-hero {
      text-align: left;
      margin-bottom: 28px;
    }
    .comp-title {
      font-family: var(--font);
      font-size: 36px;
      font-weight: 800;
      line-height: 1.1;
      margin-bottom: 10px;
      color: var(--text);
    }
    .comp-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      color: var(--muted);
      font-size: 13px;
    }

    /* ── Round tabs ──────────────────────────────────────────── */
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .tab-btn {
      padding: 10px 20px;
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--muted);
      font-family: var(--font);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      border-radius: 0;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    /* ── View toggle ─────────────────────────────────────────── */
    .view-toggle {
      display: flex;
      gap: 6px;
      margin-bottom: 24px;
      justify-content: center;
    }
    .toggle-btn {
      padding: 7px 16px;
      border-radius: 56px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      font-family: var(--font);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }
    .toggle-btn.active {
      border-color: transparent;
      background: var(--accent3);
      color: var(--accent);
    }

    /* ── Level card ──────────────────────────────────────────── */
    .level-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 16px;
    }
    .level-card-header {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .filter-select {
      font-family: var(--font);
      font-size: 12px;
      font-weight: 500;
      padding: 6px 32px 6px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
      background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%23909090' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
      background-repeat: no-repeat;
      background-position: right 12px center;
    }
    .filter-select:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }
    .filter-clear {
      font-family: var(--font);
      font-size: 11px;
      font-weight: 600;
      padding: 6px 12px;
      border: none;
      border-radius: 8px;
      background: none;
      color: var(--muted);
      cursor: pointer;
    }
    .filter-clear:hover { color: var(--text); }

    /* ── Apparatus sub-section ───────────────────────────────── */
    .app-section { padding: 16px 20px 0; }
    .app-section:last-child { padding-bottom: 16px; }
    .app-label {
      font-size: 16px;
      font-weight: 500;
      color: var(--accent);
      margin-bottom: 12px;
    }

    /* ── Results table ───────────────────────────────────────── */
    .table-wrap { overflow-x: auto; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    th {
      padding: 8px 12px;
      text-align: left;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    tr.dns-row td { opacity: 0.45; }

    /* ── Rank badge ──────────────────────────────────────────── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 9px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 700;
      white-space: nowrap;
    }
    .badge-gold { background: rgba(245, 158, 11, 0.12); color: #d97706; }
    .badge-silver { background: rgba(148, 163, 184, 0.12); color: #64748b; }
    .badge-bronze { background: rgba(180, 83, 9, 0.12); color: #b45309; }
    .badge-medal { background: rgba(0, 13, 255, 0.07); color: #4a50c7; }
    .badge-rank { background: var(--surface2); color: var(--muted); }
    .badge-dns { background: rgba(144,144,144,0.1); color: var(--muted); }

    .score-val {
      font-weight: 700;
      font-size: 14px;
    }
    .score-total {
      font-weight: 800;
      font-size: 16px;
      color: var(--accent);
    }
    .app-score {
      color: var(--muted);
      font-size: 12px;
    }
    .gymnast-name { font-weight: 500; }
    .gymnast-club { font-weight: 500; color: var(--muted); max-width: 12ch; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    td.app-score, td.score-cell { text-align: center; }
    th.col-score { text-align: center; }

    /* ── Empty / loading / error states ─────────────────────── */
    .state-full {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      flex-direction: column;
      gap: 16px;
      text-align: center;
      padding: 40px 20px;
    }
    .state-icon { font-size: 48px; margin-bottom: 8px; }
    .state-title { font-size: 20px; font-weight: 700; }
    .state-sub { color: var(--muted); font-size: 14px; max-width: 380px; line-height: 1.6; }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .empty-row td {
      color: var(--muted);
      font-style: italic;
      text-align: center;
      padding: 20px;
    }

    @media (max-width: 600px) {
      .comp-title { font-size: 26px; }
      td, th { padding: 8px; font-size: 12px; }
    }
  </style>
</head>
<body>

<header class="site-header">
  <div class="site-header-inner">
    <div class="logo"><img src="./Logo-mono-white.svg" alt="GymComp" height="20" /></div>
    <span class="view-badge">Live Results</span>
    <div class="live-pill" id="livePill" style="display:none">
      <span class="live-dot"></span> LIVE
    </div>
  </div>
</header>

<main class="page" id="main">
  <div class="state-full">
    <div class="spinner"></div>
    <div class="state-title">Loading…</div>
  </div>
</main>

<script>
  const SUPABASE_URL = "https://xjuwbgitqsvrmoejvzwb.supabase.co";
  const SUPABASE_KEY = "sb_publishable_7jhhejhXAH8hlX-gnsElnA_1ih0G-2f";
  const POLL_MS = 10000;

  let activeRound = null;
  let activeView = "apparatus"; // "apparatus" | "overall"
  let levelFilter = "all";
  let ageFilter = "all";
  let compData = null;
  let gymnasts = [];
  let scores = {};

  const params = new URLSearchParams(location.search);
  const compId = params.get("comp");

  // ── Score helpers ──
  const sk = (rid, gid, app) => `${rid}__${gid}__${app}`;
  const getScore = (rid, gid, app) => parseFloat(scores[sk(rid, gid, app)]) || 0;
  const getTotal = (rid, gid) => (compData.apparatus || []).reduce((s, a) => s + getScore(rid, gid, a), 0);

  // ── Standard competition ranking (1,2,2,4,5,6) ──
  function standardRank(items, scoreKey) {
    const sorted = [...items].sort((a, b) => b[scoreKey] - a[scoreKey]);
    let rank = 1;
    return sorted.map((item, i) => {
      if (i > 0 && sorted[i][scoreKey] < sorted[i - 1][scoreKey]) rank = i + 1;
      return { ...item, rank };
    });
  }

  function escHtml(str) {
    return String(str || "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  function getUniqueLevels(rid) {
    const roundG = gymnasts.filter(g => g.round === rid);
    const present = new Set(roundG.map(g => {
      const lo = (compData.levels || []).find(l => l.id === g.level);
      return lo ? lo.name : "Unknown";
    }));
    // Return in compData.levels order
    const ordered = (compData.levels || []).map(l => l.name).filter(n => present.has(n));
    if (present.has("Unknown")) ordered.push("Unknown");
    return ordered;
  }

  function getUniqueAges(rid) {
    const roundG = gymnasts.filter(g => g.round === rid);
    const selectedLevelObj = (compData.levels || []).find(l => l.name === levelFilter);
    if (!selectedLevelObj || selectedLevelObj.rankBy !== "level+age") return [];
    return [...new Set(roundG.filter(g => {
      const lo = (compData.levels || []).find(l => l.id === g.level);
      return (lo ? lo.name : "Unknown") === levelFilter;
    }).map(g => g.age || "Unknown"))].sort();
  }

  function isAgeFilterEnabled() {
    if (levelFilter === "all") return false;
    const lo = (compData.levels || []).find(l => l.name === levelFilter);
    return lo && lo.rankBy === "level+age";
  }

  function setLevelFilterVal(val) {
    levelFilter = val;
    ageFilter = "all";
    renderPage();
  }

  function setAgeFilterVal(val) {
    ageFilter = val;
    renderPage();
  }

  function clearFilters() {
    levelFilter = "all";
    ageFilter = "all";
    renderPage();
  }

  function buildFilterHtml(rid) {
    const levels = getUniqueLevels(rid);
    if (levels.length < 2) return "";
    const ages = getUniqueAges(rid);
    const showAge = isAgeFilterEnabled();
    const hasActive = levelFilter !== "all" || ageFilter !== "all";
    return `
      <div style="display:flex;gap:8px;align-items:center;justify-content:flex-end;margin-bottom:16px;flex-wrap:wrap">
        <select class="filter-select" onchange="setLevelFilterVal(this.value)">
          <option value="all"${levelFilter === "all" ? " selected" : ""}>All Levels</option>
          ${levels.map(l => `<option value="${escHtml(l)}"${l === levelFilter ? " selected" : ""}>${escHtml(l)}</option>`).join("")}
        </select>
        <select class="filter-select" onchange="setAgeFilterVal(this.value)" ${showAge ? "" : "disabled"}>
          <option value="all"${ageFilter === "all" ? " selected" : ""}>All Ages</option>
          ${ages.map(a => `<option value="${escHtml(a)}"${a === ageFilter ? " selected" : ""}>${escHtml(a)}</option>`).join("")}
        </select>
        ${hasActive ? `<button class="filter-clear" onclick="clearFilters()">Clear</button>` : ""}
      </div>
    `;
  }

  function rankBadge(rank) {
    if (rank === null) return `<span class="badge badge-dns">DNS</span>`;
    if (rank === 1) return `<span class="badge badge-gold">🥇 1st</span>`;
    if (rank === 2) return `<span class="badge badge-silver">🥈 2nd</span>`;
    if (rank === 3) return `<span class="badge badge-bronze">🥉 3rd</span>`;
    if (rank <= 6) return `<span class="badge badge-medal">🎖️ ${rank}th</span>`;
    return `<span class="badge badge-rank">${rank}th</span>`;
  }

  // ── Build level groups ──
  function buildRankGroups(rid) {
    const roundGymnasts = gymnasts.filter(g => g.round === rid);
    const map = {};
    roundGymnasts.forEach(g => {
      const levelObj = (compData.levels || []).find(l => l.id === g.level);
      const levelName = levelObj ? levelObj.name : "Unknown";
      const rankBy = levelObj ? (levelObj.rankBy || "level") : "level";
      const ageLabel = rankBy === "level+age" ? (g.age || "Unknown") : "";
      const key = `${levelName}|||${ageLabel}`;
      if (!map[key]) map[key] = { levelName, ageLabel, gymnasts: [] };
      map[key].gymnasts.push(g);
    });
    const levelOrder = (compData.levels || []).map(l => l.name);
    return Object.entries(map)
      .sort(([a], [b]) => {
        const aLevel = a.split("|||")[0];
        const bLevel = b.split("|||")[0];
        const ai = levelOrder.indexOf(aLevel);
        const bi = levelOrder.indexOf(bLevel);
        return (ai === -1 ? 999 : ai) - (bi === -1 ? 999 : bi);
      })
      .map(([, val]) => val);
  }

  // ── Apparatus view ──
  function renderApparatusView(rid) {
    const allGroups = buildRankGroups(rid);
    const groups = allGroups.filter(rg => {
      if (levelFilter !== "all" && rg.levelName !== levelFilter) return false;
      if (ageFilter !== "all" && rg.ageLabel !== ageFilter) return false;
      return true;
    });
    const apparatus = compData.apparatus || [];
    if (!groups.length) return `<div style="color:var(--muted);text-align:center;padding:40px">No results to display yet.</div>`;

    return groups.map(({ levelName, ageLabel, gymnasts: glist }) => {
      const groupLabel = ageLabel ? `${escHtml(levelName)} <span style="font-size:14px;font-weight:600;color:var(--text);background:rgba(0,13,255,0.06);padding:4px 12px;border-radius:99px;margin-left:8px">${escHtml(ageLabel)}</span>` : escHtml(levelName);

      const appSections = apparatus.map(app => {
        const withScores = glist.map(g => ({ ...g, score: getScore(rid, g.id, app) }));
        const hasSomeScore = withScores.some(g => g.score > 0);

        let rows;
        if (hasSomeScore) {
          const ranked = standardRank(withScores.filter(g => g.score > 0 && !g.dns), "score");
          const unscored = withScores.filter(g => (g.score === 0 && !g.dns));
          const dns = withScores.filter(g => !!g.dns);
          rows = [
            ...ranked.map(g => `
              <tr>
                <td>${rankBadge(g.rank)}</td>
  
                <td class="gymnast-name">${escHtml(g.name)}</td>
                <td class="gymnast-club">${escHtml(g.club || "")}</td>
                <td class="score-cell"><span class="score-val">${g.score.toFixed(3)}</span></td>
              </tr>
            `),
            ...unscored.sort((a, b) => (parseInt(a.number) || 0) - (parseInt(b.number) || 0)).map(g => `
              <tr>
                <td></td>
  
                <td class="gymnast-name">${escHtml(g.name)}</td>
                <td class="gymnast-club">${escHtml(g.club || "")}</td>
                <td class="score-cell" style="color:var(--muted)">—</td>
              </tr>
            `),
            ...dns.map(g => `
              <tr class="dns-row">
                <td>${rankBadge(null)}</td>
  
                <td>${escHtml(g.name)}</td>
                <td style="color:var(--muted)">${escHtml(g.club || "")}</td>
                <td class="score-cell" style="color:var(--muted)">—</td>
              </tr>
            `)
          ].join("");
        } else {
          // No scores yet — show all gymnasts in number order
          const sorted = [...withScores].filter(g => !g.dns).sort((a, b) => (parseInt(a.number) || 0) - (parseInt(b.number) || 0));
          const dns = withScores.filter(g => !!g.dns);
          rows = [
            ...sorted.map(g => `
              <tr>
                <td></td>
  
                <td class="gymnast-name">${escHtml(g.name)}</td>
                <td class="gymnast-club">${escHtml(g.club || "")}</td>
                <td class="score-cell" style="color:var(--muted)">—</td>
              </tr>
            `),
            ...dns.map(g => `
              <tr class="dns-row">
                <td>${rankBadge(null)}</td>
  
                <td>${escHtml(g.name)}</td>
                <td style="color:var(--muted)">${escHtml(g.club || "")}</td>
                <td class="score-cell" style="color:var(--muted)">—</td>
              </tr>
            `)
          ].join("");
        }

        return `
          <div class="app-section">
            <div class="app-label">${escHtml(app)}</div>
            <div class="table-wrap">
              <table>
                <thead><tr><th>Rank</th><th>Gymnast</th><th>Club</th><th class="col-score">Score</th></tr></thead>
                <tbody>${rows}</tbody>
              </table>
            </div>
          </div>
        `;
      }).join("");

      return `
        <div class="level-card">
          <div class="level-card-header">${groupLabel}</div>
          ${appSections}
        </div>
      `;
    }).join("");
  }

  // ── Overall view ──
  function renderOverallView(rid) {
    const allGroups = buildRankGroups(rid);
    const groups = allGroups.filter(rg => {
      if (levelFilter !== "all" && rg.levelName !== levelFilter) return false;
      if (ageFilter !== "all" && rg.ageLabel !== ageFilter) return false;
      return true;
    });
    const apparatus = compData.apparatus || [];
    if (!groups.length) return `<div style="color:var(--muted);text-align:center;padding:40px">No results to display yet.</div>`;

    return groups.map(({ levelName, ageLabel, gymnasts: glist }) => {
      const groupLabel = ageLabel ? `${escHtml(levelName)} <span style="font-size:14px;font-weight:600;color:var(--text);background:rgba(0,13,255,0.06);padding:4px 12px;border-radius:99px;margin-left:8px">${escHtml(ageLabel)}</span>` : escHtml(levelName);
      const withTotals = glist.map(g => ({ ...g, total: getTotal(rid, g.id) }));
      const ranked = standardRank(withTotals.filter(g => g.total > 0 && !g.dns), "total");
      const unscored = withTotals.filter(g => g.total === 0 && !g.dns);
      const dns = withTotals.filter(g => !!g.dns);

      // Find top score per apparatus for highlighting
      const topScores = {};
      apparatus.forEach(a => {
        let best = 0;
        glist.forEach(g => { if (!g.dns) { const s = getScore(rid, g.id, a); if (s > best) best = s; } });
        if (best > 0) topScores[a] = best;
      });

      const appHeaders = apparatus.map(a => `<th class="col-score">${escHtml(a)}</th>`).join("");

      const rows = [
        ...ranked.map(g => {
          const appCells = apparatus.map(a => {
            const s = getScore(rid, g.id, a);
            const isTop = s > 0 && topScores[a] && s === topScores[a];
            return `<td class="app-score"${isTop ? ' style="background:rgba(0,13,255,0.08);color:var(--accent);font-weight:700"' : ''}>${s > 0 ? s.toFixed(3) : "—"}</td>`;
          }).join("");
          return `
            <tr>
              <td>${rankBadge(g.rank)}</td>

              <td class="gymnast-name">${escHtml(g.name)}</td>
              <td class="gymnast-club">${escHtml(g.club || "")}</td>
              ${appCells}
              <td class="score-cell"><span class="score-total">${g.total.toFixed(3)}</span></td>
            </tr>
          `;
        }),
        ...unscored.sort((a, b) => (parseInt(a.number) || 0) - (parseInt(b.number) || 0)).map(g => {
          const appCells = apparatus.map(a => {
            const s = getScore(rid, g.id, a);
            return `<td class="app-score"${s > 0 ? '' : ' style="color:var(--muted)"'}>${s > 0 ? s.toFixed(3) : "—"}</td>`;
          }).join("");
          return `
            <tr>
              <td></td>

              <td class="gymnast-name">${escHtml(g.name)}</td>
              <td class="gymnast-club">${escHtml(g.club || "")}</td>
              ${appCells}
              <td class="score-cell" style="color:var(--muted)">—</td>
            </tr>
          `;
        }),
        ...dns.map(g => {
          const appCells = apparatus.map(() => `<td class="app-score" style="color:var(--muted)">—</td>`).join("");
          return `
            <tr class="dns-row">
              <td>${rankBadge(null)}</td>

              <td>${escHtml(g.name)}</td>
              <td style="color:var(--muted)">${escHtml(g.club || "")}</td>
              ${appCells}
              <td class="score-cell" style="color:var(--muted)">—</td>
            </tr>
          `;
        })
      ].join("");

      const hasAnyScore = withTotals.some(g => g.total > 0);

      // If no scores yet, show all gymnasts in number order without ranks
      let finalRows = rows;
      if (!hasAnyScore) {
        const sorted = [...withTotals].filter(g => !g.dns).sort((a, b) => (parseInt(a.number) || 0) - (parseInt(b.number) || 0));
        const dnsOnly = withTotals.filter(g => !!g.dns);
        finalRows = [
          ...sorted.map(g => {
            const appCells = apparatus.map(() => `<td class="app-score" style="color:var(--muted)">—</td>`).join("");
            return `
              <tr>
                <td></td>
  
                <td class="gymnast-name">${escHtml(g.name)}</td>
                <td class="gymnast-club">${escHtml(g.club || "")}</td>
                ${appCells}
                <td class="score-cell" style="color:var(--muted)">—</td>
              </tr>
            `;
          }),
          ...dnsOnly.map(g => {
            const appCells = apparatus.map(() => `<td class="app-score" style="color:var(--muted)">—</td>`).join("");
            return `
              <tr class="dns-row">
                <td>${rankBadge(null)}</td>
  
                <td>${escHtml(g.name)}</td>
                <td style="color:var(--muted)">${escHtml(g.club || "")}</td>
                ${appCells}
                <td class="score-cell" style="color:var(--muted)">—</td>
              </tr>
            `;
          })
        ].join("");
      }

      return `
        <div class="level-card">
          <div class="level-card-header">${groupLabel}</div>
          <div style="padding:16px 20px">
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>Rank</th><th>Gymnast</th><th>Club</th>
                    ${appHeaders}
                    <th class="col-score">Total</th>
                  </tr>
                </thead>
                <tbody>${finalRows}</tbody>
              </table>
            </div>
          </div>
        </div>
      `;
    }).join("");
  }

  function renderPage() {
    const rounds = compData.rounds || [];
    if (!activeRound && rounds.length) activeRound = rounds[0].id;

    const colour = "#000dff";
    const dateStr = compData.date
      ? new Date(compData.date + "T12:00:00").toLocaleDateString("en-GB", { weekday: "long", day: "numeric", month: "long", year: "numeric" })
      : "";
    const venue = compData.venue || compData.location || "";

    const roundBtns = rounds.length > 1 ? rounds.map(r => `
      <button class="tab-btn ${r.id === activeRound ? "active" : ""}"
        onclick="switchRound('${r.id}')">${escHtml(r.name)}</button>
    `).join("") : "";

    const controlsHtml = `
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:24px;flex-wrap:wrap">
        <button class="toggle-btn ${activeView === "apparatus" ? "active" : ""}" onclick="switchView('apparatus')">Per Apparatus</button>
        <button class="toggle-btn ${activeView === "overall" ? "active" : ""}" onclick="switchView('overall')">Overall</button>
        ${roundBtns ? `<div style="flex:1"></div><div style="display:flex;gap:8px;flex-wrap:wrap">${roundBtns}</div>` : ""}
      </div>
    `;

    const filterHtml = buildFilterHtml(activeRound);
    const contentHtml = activeView === "apparatus"
      ? renderApparatusView(activeRound)
      : renderOverallView(activeRound);

    document.getElementById("main").innerHTML = `
      <div class="comp-hero">
        <div class="comp-title">${escHtml(compData.name || "Competition")}</div>
        <div class="comp-meta">
          ${dateStr ? `<span style="display:flex;align-items:center;gap:6px"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="12" height="11" rx="1.5"/><path d="M2 7h12M5 1v4M11 1v4"/></svg>${dateStr}</span>` : ""}
          ${venue ? `<span style="display:flex;align-items:center;gap:6px"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8 1.5a4.5 4.5 0 014.5 4.5c0 3.5-4.5 8.5-4.5 8.5S3.5 9.5 3.5 6A4.5 4.5 0 018 1.5z"/><circle cx="8" cy="6" r="1.5"/></svg>${escHtml(venue)}</span>` : ""}
        </div>
      </div>
      ${controlsHtml}
      ${filterHtml}
      ${contentHtml}
    `;
  }

  function switchRound(rid) {
    activeRound = rid;
    renderPage();
  }

  function switchView(v) {
    activeView = v;
    renderPage();
  }

  function updateTimestamp() {
    const el = document.getElementById("lastUpdated");
    if (el) el.textContent = new Date().toLocaleTimeString("en-GB", { hour: "2-digit", minute: "2-digit", second: "2-digit" });
  }

  async function fetchData() {
    if (!compId) return null;
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/competitions?id=eq.${encodeURIComponent(compId)}&select=*`,
      { headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` } }
    );
    if (!res.ok) return null;
    const rows = await res.json();
    return rows[0] || null;
  }

  // Fetch scores from the dedicated scores table (anon key)
  async function fetchTableScores() {
    if (!compId) return [];
    try {
      const res = await fetch(
        `${SUPABASE_URL}/rest/v1/scores?comp_id=eq.${encodeURIComponent(compId)}&select=*`,
        { headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` } }
      );
      if (!res.ok) return [];
      return await res.json();
    } catch { return []; }
  }

  // Convert scores table rows → flat object
  function scoresToFlat(rows) {
    const flat = {};
    for (const row of rows) {
      const bk = `${row.round_id}__${row.gymnast_id}__${row.apparatus}`;
      flat[bk] = row.final_score != null ? String(row.final_score) : "";

      const eScores = row.e_scores;

      // Dual vault: e_scores is an object — just use final_score (already set above)
      if (eScores && typeof eScores === "object" && !Array.isArray(eScores) && eScores.dualVault) {
        continue;
      }

      // Normal score
      if (row.d_score != null) flat[`${bk}__dv`] = String(row.d_score);
      if (row.bonus != null && row.bonus !== 0) flat[`${bk}__bon`] = String(row.bonus);
      if (row.penalty != null && row.penalty !== 0) flat[`${bk}__pen`] = String(row.penalty);
      const eArr = eScores || [];
      if (Array.isArray(eArr)) {
        for (let i = 0; i < eArr.length; i++) {
          if (eArr[i] != null) flat[`${bk}__e${i + 1}`] = String(eArr[i]);
        }
      }
    }
    return flat;
  }

  async function poll() {
    const [row, tableRows] = await Promise.all([fetchData(), fetchTableScores()]);
    if (!row || !row.data) return;
    compData = row.data.compData || {};
    gymnasts = row.data.gymnasts || [];
    // Scores come exclusively from the scores table
    scores = tableRows.length > 0 ? scoresToFlat(tableRows) : {};
    renderPage();
    updateTimestamp();
  }

  async function init() {
    if (!compId) {
      document.getElementById("main").innerHTML = `
        <div class="state-full">
          <div class="state-icon">🔗</div>
          <div class="state-title">No competition ID</div>
          <div class="state-sub">Please open this link from the competition dashboard. The URL should include <code>?comp=…</code></div>
        </div>`;
      return;
    }

    const [row, tableRows] = await Promise.all([fetchData(), fetchTableScores()]);
    if (!row || !row.data) {
      document.getElementById("main").innerHTML = `
        <div class="state-full">
          <div class="state-icon">⚠️</div>
          <div class="state-title">Competition not found</div>
          <div class="state-sub">Please check your link or contact the event organiser.</div>
        </div>`;
      return;
    }

    compData = row.data.compData || {};
    gymnasts = row.data.gymnasts || [];
    // Scores come exclusively from the scores table
    scores = tableRows.length > 0 ? scoresToFlat(tableRows) : {};

    renderPage();
    updateTimestamp();
    document.getElementById("livePill").style.display = "flex";

    setInterval(poll, POLL_MS);
  }

  init();
</script>
</body>
</html>
